body:
  text: 序徑石滴乳者山鐸在公所編道脈淵源之書也書垂成而在公脫去其得法門人石源雲公取而録成之以彰先人之用以述宗統之全其編始自徑山採於曹石倉談掃菴及錢牧齋三君子當萬曆啓禎之際天下皆知讀佛書而能遡派尋源惟三君子為最悉三君子蓋親覩臨濟所書源流於徑山者也是時鼓獅絃者如林而袁了凡身受雲谷之祕憨大師自謂親得谷公鉗鎚博綜教典橫竪妙用如夢遊影響諸書未嘗不全提也故於雲居顓公有特祝焉或律以淑身或教以演義奚必人人豎拳而曰如來真實妙義遂如此發明哉不知祕密真機蚤已託之傳人藏之雪谷無事宣泄真傍觀斯世之仰止矣余因讀雲公徑石滴乳而慨然有得於古人也楊岐踞臨濟之正宗應菴登金輪之正脈其始蓋寥寥其人而懸絲之繫惟超宗者得之何嘗板震而千人鉢鳴鐘動而食指雲下族鄧林之木不足供其杖材殲牝麂之種不能充其拂麈耶是編亦未必汁雪山之牛鏤刻亦未必盈雲藻之棟而讀其一語恍若霹靂之震天關識其德履捷若六馬之臨平坂直心顯然真諦宛在大鑑之霛臨濟之祕非賴是書以發光哉誠宜貯之香囊書之樺皮直如親見斷橋面受徑山而無所疑二矣非嫡承師乳而何能若是耶吾因有會於賢劫千佛之故也昔毗舍離城有千小兒執弓杖以亂其國王憂之小夫人知之於東樓上呼千小兒仰食其乳左乳放五百道右乳亦放五百道千小兒各各滿足皆知其母夫小夫人非真兒母則千道之乳何能悉出惟千小兒各知其母各足其乳而千道之乳始為真滴也天下之闡揚法席者豈止千小兒哉要皆未得其母者也未得真乳有左五百道右五百道在東樓間也時東城固有樓矣夫人懸兩乳以待千小兒矣或能於鏡交光處一承摩頂以入三摩地則徑石滴乳之刻吾知與正法眼藏羅湖野録現無見頂相於真丹世界矣山鐸在公之為法門正統也石源雲公之為師乳真滴也惟具眼者自識之時康熙二十一年十月初六日楚廣濟學人舒逢吉康伯氏題於東衝之黃牛院徑山滴乳集凡例是書乃東林先師所彚集者緣諸方燈録於臨濟正宗斷橋下諸祖或隱或現多有僅存傳法偈而法語機緣闕如者因是博考祖録參以傳記合成全書集未竣而先師辭世存藁失過半雲遵先志遍歷窮搜凡遇一言半句宗眼圓明者靡不亟為採入以完先師未了之願抑亦少盡小子繼述之職云燈以傳道統以繼脈道之不明統之不正先聖之所憂也先師之見法門之有壟斷憂深而慮遠故輯此書真得憲章祖述之旨今刪繁取要詳略會同俾後之學者開卷而有得焉滴乳集單録倫祖一派因諸方燈録不以佛祖嫡傳慧命為重專以我人私淑去取為乖致令諸祖語録行世者不多壽梓者亦鮮今詳採補入以補諸燈之闕略是書本為流通宗眼第真機兩輩各闡一方一時難以彚齊惟先得者先書後得者後紀未得者俟補諸録載無盡燈伏牛理儀峯彖幻寄庭憨山清等於未詳者總未得其真也今按諸公源流收彼本師之下俾知師承有在弗至湮沒性空聞下出月潭澄澄出薦福愷愷出華山聞聞出天目定定出浮山智智出妙峯理其嗣裔久闡雲貴不及採集俟補黃檗有諸書收在未詳惟弘覺綴於大休隆下雲閲大休録見有公敘曰師於嘉靖二十一年示寂越二年而余始生又越十八年方始行腳至四十五歲方得打開夢眼云云據此有公雖得大休心印實未謀面是書亦復收於未詳不敢編入正宗以紊統系也鵝湖心燈録載之未詳其載機緣與蘭風華山録內機緣相符據此則師承昭著何得云為未詳但鵝湖示寂後遙嗣者不收黃州石門後學機雲識徑石滴乳集目録第一卷徑山無準師範禪師大鑒下第二十世臨濟下第十五世徑山下第一世徑山範禪師法嗣天台斷橋妙倫禪師徑山下第二世天台倫禪師法嗣瑞巖方山文寶禪師南華永宗達本禪師雪山法曇禪師絶象鑒禪師竹屋簡禪師藏室會珍禪師竹山如圭禪師古田垕禪師語別見徑山下第三世瑞巖寶禪師法嗣天台無見先覩禪師鳳山一源靈禪師松巖秋江元湛禪師天台無盡祖燈禪師鏡堂古禪師不列章次丁生居士古田垕禪師法嗣東澗珣禪師語別見徑山下第四世天台覩禪師法嗣福林無聞智度禪師鏡堂古禪師法嗣則中度禪師徑山下第五世白雲度禪師法嗣天界古拙俊禪師太守密菴何居士不列章次第二卷徑山下第六世天界俊禪師法嗣道林無際明悟禪師虎跑性天如皎禪師密菴何太守法嗣素葊田大士徑山下第七世東林悟禪師法嗣太岡月溪惟澄禪師壞空成禪師妙峰玄禪師廬山無為一禪師伏牛無礙鑒禪師古庭善堅禪師東山楚山紹琦禪師大定太虗沖禪師禪雪峰瑞禪師伏牛物外圓信禪師潔空圓通禪師八峰寶月潭禪師不二圓禪師德翁淳禪師二人語別見素菴田大士法嗣天寧和菴忠禪師四明法中正堪禪師建寧佛迹頤菴真禪師徑山下第八世太岡澄禪師法嗣太岡夷峯方寧禪師牛頭古心寶禪師東永福自秀禪師靈隱性天宗杲禪師天淵道堪一源禪師德山古心安禪師南陽峻中嶸禪師天真毒峰本善禪師五臺孤月淨澄禪師壞空成禪師法嗣光澤道惠禪師斗峯德章淨滿禪師妙峰玄禪師法嗣風穴福緣廣禪師廬山一禪師法嗣神鼎寶藏淨玉禪師伏牛鑒禪師法嗣仰山無隱正道禪師無邊古道通禪師不列章次大溈獨潭海昌禪師西山古巖從定禪師天竺行一秀禪師龍牙鐵牛勤禪師古庭堅禪師法嗣波羅禪師五臺顯淨倫禪師洱水道菴居士東山琦禪師法嗣八峯性空聞禪師金山僧寶禪師中溪隱山昌雲禪師海雲深禪師湛淵奫禪師濟川洪禪師大雲興禪師石經海珠祖意禪師長松大心真源禪師大悲一天智中國師石經豁堂祖裕禪師月光常慧禪師翠微悟