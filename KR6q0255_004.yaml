body:
  text: 清嗣祖沙門江州直在編嗣法門人齊安機雲續徑山下第十二世敬畏空禪師法嗣杭州徑山無幻性沖禪師字古湛秀水張氏子母卜氏誕師之夕夢橋上一雞飛沖上天因名橋嬰時每啼不止唯以供具列於前即輟丱歲率羣兒以瓦石作殿像羅拜既納內育子嘗歎塵勞膠固曷得出離聞無趣乃本色道人欣然往參趣誨以教外別傳之旨有所契入遂剃染結菴徑山集無趣語及見趣趣曰曾做什麼來師曰買得一段田收得元本契請和尚僉押趣展閲曰這個是我的你的聻師曰莫搶奪行市趣擲下集本師便出龍興在曰一人肘後懸符一人頂竪摩醯二俱作家烜赫古今若作臨濟兒孫猶欠在何故敵勝從中出須憑師子兒龍門性頌曰相逢各自展家風祖業兒孫用不窮大海無涯資躍鯉長空萬里縱飛鴻金明旭頌曰龍門久駐飛騰勢才便風雷趂晚潮驚起泥牛穿碧海轉身一拶直沖霄石門雲頌曰借婆衫子拜婆年體段風流出自然更有一般純粹處御街掩袖月明前拂拂春風搖地軸沉沉夜雨洗天根銀濤萬疊資鱗躍鼓鬣雲端海嶽昏無趣問徹骨徹髓道一句三玄三要絶遮護此二句中我欲取一句為法汝道取那一句好師曰和尚適來道那一句趣瞋目叱曰汝恁麼無記性師曰祇為和尚徹骨徹髓趣笑曰不然為子一人即得爭奈大衆何師曰取即不辭恐辜負先代喪我後人趣曰如是如是趣付偈曰師傳拈花宗我示微笑法親手展付汝持奉遍塵剎金明旭曰無幻大似一顆走盤珠愈琢愈輝趣祖驗得號段分明也是勾賊破家師燒火次僧問如何是自性天真佛幻云搬柴來僧搬柴了又理前問師云者奴子好惡也不知便打徑山進頌曰大富須還長者家天然隨處有生涯可憐不識寰中寶錯認真金作赤沙牧公謙頌曰腳下魚行總不知因憐𪂶𮭗亦何癡幾多負義忘恩者徒有雙雙兩道眉鐵容玄頌曰長安年少惜花殘爭認慈恩紫牡丹別有冰盤承露冷無人起就月中看潛夫峻頌曰桃源洞口尋春色野老頻呼在此中遊遍園林猶借問不知身在萬花叢兩客下棋次僧請益師曰若論此事如兩家著棋用心鮮有不克者何則若也未知局面舉必全乖不善權宜觸途遭喪祇為他意馬散失狂象無鈎兵車不識機關心粗常行險地不惟重重納敗將見皮破血流若是主將威嚴士途平坦如是而炮不虗發發則打破重圍兵不亂行誰肯直前退後天馬而追風八面神車而竟沒遮欄不惟致勝奏功畢竟風行草偃良久曰太平本是將軍定不許將軍見太平僧問如何是提婆宗師曰一字不著畫曰不問者個師曰圓相不著圈二祖雲徵曰要會一字不著畫圓相不著圈麼直須倒退三千里師住車溪二十餘年日與衲子商確大事罔不悅服萬曆三十八年復住徑山上堂大道無向背至理絶言詮迥出三乘高超十地萬法不到處特地光輝生佛未分時靈源獨耀不落見聞不隨聲色直下無一絲毫頭遍界全彰縱饒棒頭取證喝下承當猶是曲為今時倘或光景俱忘契心平等亦非的旨所以道向上一路千聖不傳學者勞形如猿捉影到者裏絶行絶解絶照絶用絶理絶事若倚天長劍凜凜神威如鐵牛之機籠羅不住今日明眼人前不敢囊藏被蓋八字打開拈拂子曰諸人還委悉麼耀古騰今祇者是大千世界一間身因病僧問和尚百年後向甚麼處去師曰千株松下角彎彎百草頭邊亂𨁝跳能仁在曰車溪恁般答話知天下後世千燈萬𦦨當從其足下出者僧若有問殺闍黎價逼殺首座處底手腳待車溪才擬對便掩耳而出且要老漢立地脫去萬曆辛亥季冬初四日傳廣首座袈裟偈曰塔前付囑無多子百萬人天那個尋未審是誰成漏泄至今殃禍及兒孫滴乳曰余考傳燈惟南嶽侍曹溪八載只道個説似一物即不中招得追風馬子南明侍車溪八載止換得個破袈裟且道與古人同也別也參端坐而逝闍維塔於徑山壽七十二臘三十雲谷會禪師法嗣韶州曹溪憨山德清禪師字澄印全椒蔡氏子七歲見叔母生子又見叔死即抱生死去來之疑年十二禮南京報恩寺西林寧公為師時嘉興雲谷會住棲霞報恩師執侍甚勤谷開發悟明心地師即請西林剃落盡燒所習外學謁無極受具聽講華嚴玄談有省乙丑谷結禪期於天界舉師入堂示以向上巴鼻辛未辭谷北遊谷曰吾之大法在汝肩頭慎勿容易邸中閲物不遷論至梵志出家頓了旋嵐偃嶽之句生死去來之疑乃作偈曰生死晝夜水流花謝今日乃知鼻孔向下乙亥禮文殊結茅五臺之龍門匡山徹空雲棲蓮池相繼入山與師語契辛巳仲冬慈聖皇太后為神廟建祈儲道場於五臺大塔寺百有二十二日師與妙峯主其事壬午八月光廟誕生癸未春遁居東海牢山恢復那羅延窟慈聖再徵不得甲申乃得師輒賜內帑師倣古矯詔賑飢事以賑山東民丙戌慈聖頒藏經布金造寺賜額海印丁亥工竣即開爐韝己丑請藏至南京報恩感寶塔放光乙未方士流言侵攘逮赴詔獄按驗無實坐以私創寺院戍雷州衛道出江西鄒元標迎至鐵佛菴與師一語投契頓翻前案丙申禮六祖抵戍寓城西坡公亭雷州飢癘師收埋骸骨萬計建盂蘭會説幽冥戒天大雨癘隨止戊戌修曹溪通志戒靈通侍者酒歸侵田斥僦舍屠門酒肆皆為寶所大鑑之道勃焉中興師舉雲門光不透脫有兩般病因緣頌曰天街花月影珊珊沉醉東風獨倚欄朝罷九重人靜後六宮猶尚整衣冠舉僧問雲門不起一念還有過也無門曰須彌山頌曰天寒霜落月沉西清夜迢迢鶴夢迷海底日輪紅似火行人猶聽五更雞舉德山托鉢因緣頌曰間看師子謾調兒顧欠呻力盡施觸著翻身聊一擲低頭歸去令全提甲寅夏慈聖賓天詔至師返僧服丁巳建法雲寺於廬山五乳峰下效遠公六時修淨業天啓壬戌復住曹溪癸亥十月十一日示微疾沐浴焚香集衆告別顧曰今日截斷葛藤端坐而逝世壽七十八僧臘六十有夢遊集經論注解二十餘種乙丑歲龕歸五乳塔而藏焉崇禎癸未粵人復奉龕歸曹溪歷年二十端坐如生遂金漆塗體升座與六祖肉身相望就天峙岡舊塔院地供養名曰憨山院去南華寺半里許中溪覺林居士李元陽生而頴悟過目成誦初得方士授導引之術以為神仙必致後因讀楞嚴經大駭曰世有如是書乎遂留心內典樂與僧遊自號覺林居士在翰時常遊法席見雲谷遂蒙印可與默菴定堂二師為方外契所著有禪源記及中溪類稿等書流行於世龍池聞禪師法嗣天目蘭風真定禪師餘姚陳氏子夙有根器雅慕禪宗年二十禮天目公為師未幾往五臺一十三載後至徐州鐵佛寺一夜因風吹殿門有省尋參龍池獲心印自此遊歷諸方三十餘秋江淮之間聲名大著師嘗頌隨緣赴感有盡微塵界菩提坐不動秋毫轉法輪之句師著冰壺宗鑑及維摩經注共二十七卷行世於萬曆壬午正月八日示微疾至十五日跏趺而逝廣信府鵝湖禪師郡之上饒朱氏子偶遇戚屬會道者談四生之義師於言下洞了物我平等大意往洛之大平落髮南歸焦山度臘聞江中推船有省偈曰夜靜江空闊推船㘞㘞聲不知何所往擔子半邊輕謁華山聞山拈一段生涯六不收話猛提七日身心脫然尋歸里中住靈山畫大圓相於壁間曰內寫莫教塗黑外寫勿使傷白有人向圈裏圈外下得注腳者許你學道無疑不然總是懡㦬後住鵝湖十年不立座元博山參以趙州無字話相契請居厥職贈以偈曰鵝湖十載虗元位一旦元何立少年兩箇眉毛八箇繓須知佛祖不容前嘗置無門鎖置方丈壁以驗諸方偈曰上古流傳鎖憑君智鑰開若無開鎖法相見不須來萬曆丁二月晦日上堂説法置齋作別示偈曰八十餘年幻夢中鐵牛耕破太虗空臨行一句相分付半夜金烏帶日紅端坐而逝伏牛理禪師法嗣均州武當佛巖雲菴真際禪師神宗時為慈聖皇太后轉大藏詔住靈應寺恩寵甚渥賜號不二大師上堂示衆祕魔叉擔雪填井禾山鼓眼裡撒沙飢虗抑勒托鉢法堂驀拈拂子云者隊守古冢底不知曲了多少今日落在佛巖手裏不穿却鼻孔定是剜却你眼睛何故不入洪波裏爭見弄潮人徑山下第十三世徑山沖禪師法嗣杭州徑山南明惠廣禪師鹽官韓氏子禮興善芹泉剃染志慕禪學恨其宗風不著遍遊講肆復歸掩關於無字話凝然始覺物理一致古湛聞有真實志乃就關扣問便有師資之契遂啓關往謁古湛於車溪未幾即入古湛舊隱之白雲山禁足三載徑山繼峰老宿請湛開法師每聞示誨必垂淚刻究一日偶拾片紙有觀方知彼去去者不至方之句有省呈湛湛印可即舉師首衆尋付偈曰得本無所得傳亦無可傳今付無傳法東西共一天天鐸源頌曰八載巾瓶窮徹骨大千攝向一毫端可憐家破人亡處猶把封皮當信看胡機郁頌曰頓絶狐疑遠探玄劫壺空處妙難詮而今積聚毫端上一鼓雷音遍大千金明旭頌曰禹貢上承堯舜德盛明猶見漢唐心此時不必問端拱帝業持盈已到今雨山越頌曰河出圖洛出書藍田産美玉赤水育玄珠仙姿不是人間種殼裏藏身供上廚石門雲頌曰鑊湯𨁝跳上刀山氣擁眉間海樣寬回首死撾塗毒鼓血漫漫地照人寒住徑山示衆五峯頭卓朔雙徑尾顛先喝石巖𨁝跳明月池傾天此四句一句中有殺人刀無活人劍一句中有活人劍無殺人刀一句中殺人刀活人劍俱有一句中殺人刀活人劍俱無伶俐衲僧簡點得出一生參學事畢空諸性曰四句外尚有一句子百味具足不獨殺活也然雖南明終未能舉出在且道是那一句良久云覷著則瞎濟北弘曰楚黃紙貴一狀領過示衆以拂子點此相云徑山最初祇為有此一著遂爾站定腳跟一挨一拶愈究愈遠忽一日不究而究不窮而窮不究不窮不覺頓空伎倆猛地回覷又畫一此相云原來只是這箇才知者箇復打此相云便是者箇諸昆仲且道者箇作麼生理會這裡具得一隻眼方許到家示衆跳出金剛圈揣碎虗空骨剖開祕密藏放出塵沙佛大方闊步妙運寰中細剪白雲七片八片密羅黃菊一叢兩叢古佛心祖師意一齊漏泄堂堂龍象有許多眼耳為甚不見不聞驀竪拂子隨擊禪床云向者裡一舉便見一擊便聞赤肉團上無物不有無物不空真俗二諦於中顯現十聖三賢於中休息以無身為身將空法作法其熾也應萬有而不窮其寂也覓一法而不有者點靈明如珠在盤以此明心何心不明以此顯理何理不顯所以道有意相尋偏不見無心覷捕體全彰諸人須向腳跟下究取始得除夕示衆前年年鼻孔無半邊去年年兩眼不能全今年年三十精骨獻青天我禪已説了汝等作麼生參元旦示衆新年佛法有趙二契村酒醉倒李麻鬍王三笑破口新年佛法無水上按葫蘆海底蓬塵起堂堂在半途古人提掇不得底徑山恁麼舉揚者裡還有佛法商量也無合掌問訊云元正啓祚萬物咸新燈節示衆舉大慧上堂云正月十四十五雙徑槌鑼打鼓要識祖意西來看取村歌社舞師曰大慧三百六十骨節八萬四千毛孔抖得敬揑得聚可謂烜赫古今法王座上人天衆前為甚照應不到徑山今日要與劈石分金你諸人也須識得祖意西來若認定村歌社舞大似燈影裡行未覩太陽在示衆烏石嶺與汝相見了也望州亭與汝相見了也僧堂前與汝相見了也大衆作麼生説個相見的道理且道相見見個甚麼良久云鱉咬剎竿狗銜燈盞示衆舉月幻返八峯峯曰還我照用來幻曰若有照用即成障隔峯曰著廝著空佛也救不得幻曰有無俱寂滅空佛悉皆非師曰月幻氣識超羣如太阿出匣八峯鴻門大啓若海納英流可謂立賓互叶照用同施雖然還知八峯只解踞虎頭不解把虎尾麼示衆昔竹山圭禪師脫略異常一日遊佛巖聞風吹殿角鈴聲倚杖脫去茶毗得舍利無數然我衲僧得一機半解遁迹林泉久久操持掃盡廉纖末後乃有如是作略近時師僧才得一知半解就要為人師範靜工全無微細未透末後一著未免螃蟹下鍋何也一回擲地作金聲九曲黃河清徹底示衆舉南院啐同時因緣師頌曰同時啐不同時箭鐵飛紅打一鎚無限周遮頭腦裂干戈中立太平基下座示衆舉兩堂首座相見師頌兩岸夾流來滾滾一泓活碧去綿綿師兒若解反身躑海底泥牛角指天住永慶寺示衆箇般奇特妙難言驀直臯亭跳上天帝釋鼻梁遭磕破波斯痛倒海門前示衆張公乍與李公友欲進李公一杯酒返被李公進一杯好手手中呈好手大衆要見好手麼第一座抽身便出師以拄杖打散師方丈示衆甚麼物恁麼來石人舞袖笑盈腮泥牛入海無消息木馬嘶風趂不回忽趂回鐵壁銀山盡打開驀拈拄杖畫一畫云這裡還有一重示衆將心求佛墮在毒海離心意識趨向無門諸弟果能休去歇去以須彌山作四大海白浪滔天以四大海作須彌山紅塵滿地烹虗空之髓而滋味嘗新挑劫壺之燈而光明灼大者裡鈎錐不得那畔鞭索徒施所以向上一路千聖不傳學者勞形如猿捉影開彌勒之樓閣法法全彰入普賢之行門頭頭不捨到此只得木童歌白雪石女咏清泉按指則海印發光動絃則音聲滿耳接拍既有伯牙座前誰是子期示衆古人喫三頓棒如龍得水似虎靠山羅籠不住呼喚不回倒嶽傾湫平沉大地收來盡是馬簸箕簸若是靈機活脫別展家聲著著該羅步步密運到者裡須知曰晝雞啼紅塵犬吠是佛是魔三十棒管甚船來陸來或飢或飽一頓飯論甚明頭暗頭藏身處沒蹤迹布袋橫拖沒蹤迹處莫藏身拄杖倒卓大道祇在目前要且目前難覩不是目前法非耳目之所到大衆還知此消息麼良久云但得春風齊著力一時吹入我門來示衆舉月溪澄禪師參東林悟和尚呈所見林不諾溪以林強抑出不遜語一日辭林林負囊送至山門忽指黃犬曰者畜生為甚有業識無佛性溪於此大悟師曰東林垂手處大似逆鱗徑寸大岡悟去也是好肉剜瘡雖然如是者裡別有道理諸人不得草草承當示衆舉則中上堂云結制來天陰四十日今朝晴明好晒朗雖然臂肘不向外曲諸人分上也要簡點分明師曰平湖結制來四十日雨淋淋底臯亭結制來四十日乾曝曝底諸人分上亦要檢點分明無論乾箇溼箇拈向一邊以拄杖卓一卓云諸人向者裡試説道理看示衆落日如懸鼓峯前仔細觀霞光交大地一片錦山川汝等若作境話會辜負平生不作境話會亦辜負平生畢竟作麼生慧頂棟曰我最初讀夾山猿抱子歸青嶂裡鳥銜花落碧巖前覺意句冷冷然及徑山霞光交大地一片錦山川始知者個道理針劄不入水泄不通若非打破漆桶底不錯會也大難示衆舉方山寶禪師因僧問如何是般若體師云八角磨盤如何是般若用師云八角磨盤空裡走師云瑞巖只解隨邪逐惡不解回櫓就岸倘問臯亭如何是般若體驀與一掌如何是般若用更與兩掌不特指出般若體用亦且知我衲僧門下別有爪牙示衆舉方山和尚未出家時偶閲壇經恍如舊習乃舉黃梅衣鉢因緣問曰既不會佛法為甚又紹祖位鞏曰不但祖師大有人不會佛法亦紹祖位山曰和尚還紹祖位否鞏曰若紹祖位即會佛法師曰瑞巖如蟲禦木偶爾成文淨慈被伊一拶便乃平高就下唱道門中略較些子黃梅衣鉢未夢見在大衆要識黃梅衣鉢落處麼以拄杖卓一卓喝一喝下座示衆僧問三世諸佛為甚不知有師曰聰明反被聰明誤進云黧奴白牯為甚却知有師曰棒打石人頭嚗嚗論實事僧禮拜師舉斷橋上堂云雁山雲台嶠月或卷或舒或圓或缺兩兩三三朝遊暮往袈裟角拄杖頭挑底挑裏底裏不妨自怡自悅若到瑞巖定是打教棒折何故而今甚麼時節師曰古人赤心片片只要功論蓋代當日若有見義勇為者待他正與麼道從旁走出震威一喝看他做甚麼手腳更喝兩喝下去瑞巖即有定亂之謀管取退身不及示衆舉天目進禪師問夷峯寧和尚如何是西來密密意峯下禪床擒住曰西來無意你道此間是甚麼意目自此寢食俱忘一日登廁聞僧敲籌作聲忽猛省師曰大岡有驅耕奪食之施無電激雷奔之作以致天目沉言滯句墮在機境及聞籌聲遭他怪笑若是徑山打開潑天門戶一任赤驥追風精金躍冶何故青山無數行人少紅雨和煙墜綺羅師在龍居首座寮僧問已到車溪更不為人時如何師曰樓上春風時欲歇誰能攬鏡看愁眉僧擬進語師喝出鐵容玄頌曰真珠簾箔掩蘭房明月沉沉客漏長瓊佩乍生春草碧嬌容應不復臨妝雲庵量頌曰玉簫吹徹鳳凰臺古殿深沉曉未開滿地落花春已去緑陰空鎖舊莓苔僧問一念緣起無生超彼三乘權學等見阿誰緣起有生耶師震聲一喝僧禮拜晦牧密頌曰雲收雨歇海天寬浪激因風起禍端識得長江波是水沙鷗夜宿荻蘆彎聞谷問了即業障本來空為甚師子尊者被罽賓國王斬却師曰本來空曰爭奈頭何師曰本來空曰為甚罽賓國王一手墮地師曰本來空微塵盛頌曰柳汀斜對野人窗零落衰條伴曉江正是霜風飄斷處寒鷗驚起一雙雙因檀越飯僧知客行嚫維那唱云板首三分執事二分散衆一分師問侍者云汝是幾分僧無語師召知客曰何不與他僧亦無語師顧視大衆維那問訊出堂雪次侍者推窗云滿山都是雪師云隨聲逐色漢僧云請和尚離聲色道一句師云滿山都是雪普明用曰者僧身挨白刃活得命來不妨好手徑山費盡鹽醬究竟不獲稱心者裏有向聲色外別道一句者麼良久曰切忌道滿山都是雪東林在曰者僧與麼問南祖與麼答固是一等平懷普明與麼批判未免當途栽棘東林要大膽道個滿山都是雪只知龍向葛坡出不覺風雷舌上生揮拂子下座普請師擕作具領衆到山門適園頭洗菜磨頭晒巾師指二人謂衆曰園有園頭磨有磨頭復指自身云要者漢作麼衆無語師拋作具歸方丈雲庵量頌曰春有百花秋有月夏有涼風冬有雪若無間事挂心頭便是人間好時節師主法十餘年惟清白約衆孤潔自居傍門依戶之徒畏如湯火僅鴛湖獨親法乳師志在古道凡片紙隻字誠般若之腴膠也泰昌改元庚申仲冬念七日辰時囑後事畢奄然坐逝茶毗塔於徑山普同塔皆從師志世壽四十五僧臘二十三天目定禪師法嗣浮渡山華嚴寺朗目本智禪師曲靖李氏子禮白齋剃染謁佛巖不二及性天輩後登天目參蘭風契旨世稱叢林白眉一時王公大人執弟子禮慈聖皇太后法寶駐錫金谷表師主其席萬曆乙巳十二月念四日以水盥掌跏趺而逝訃聞慈聖震悼憫恤遂賜金返靈骨於浮山塔妙高之南麓以從師志也有語録若干卷行世不二際國師法嗣太原府臺山妙峯福登禪師山西平陽徐氏子從滿州萬固朗出家有願行普賢行始於讚嘆寺立關三載遇異僧指示曰普賢行乃潛行密用調一切心非勞筋苦骨之謂也師遂南遊金陵參雲谷谷拈念佛是誰話令參同憨山清北遊參遍融圓嘯巖寶大千潤諸公萬曆初再參大千於少林隱居臺山獲文殊摩頂授記明神宗為慈聖皇太后祝遐詔不二赴京奉旨於臺與師盤桓纍日機緣甚契一日被不二驀地一劄忽然大悟如是道望隆重至有猛虎開路菩薩送燈之事神宗夢師像徵赴京賜紫衣師號示寂塔於臺山敕封真佛子黃州白虎山興善寺一然如幻禪師本郡朱氏子世業儒性仁慈常行放生等事因鄉試脫榜師曰吾出家志遂矣特往襄之草店寺芟染入伏牛山火堂結制謁不二得其頴悟不二即可以法萬曆間慈聖皇太后建首楞嚴道場神宗詔入便殿賜紫並洪濟之號表歸隱廬山黃龍同徹空憨山數人復白蓮社戊午年黃州太常官公遊山嚮師道風率文學何其祥等請住志公白虎道場不數年還復舊規上堂釋迦心血達磨眼睛阿誰無分只是不許忘想所謂得之於心伊蘭作旃檀之樹失之於旨甘露乃蒺藜之園昔安國問僧一語具得失兩意汝作麼生道僧舉拳曰不可喚作拳頭也安國不肯師亦舉拳別曰祇為喚者個作拳頭大衆向者裏下得一語恰當始知毫釐有差天地懸隔掩關二十二載崇禎癸未二月十五日無疾坐化茶毗葬淋山河之乾方世壽八十四僧臘四十一嗣法弟子四人蘷州白馬寺儀峯方彖禪師達州羅氏子參金佛山雲庵和尚令看如何是鬼神不破之機三年有省出峽遍謁知識結茅雙溪一日午炊聞甑中作聲忽大悟作偈有白雲青嶂點頭之句嘗遊浙中庵於杭之清平真寂印公蚤年嘗依之一日舉青峯丙丁童子來求火話詰之曰青峯恁麼道法眼恁麼道為甚麼有悟不悟印曰初以識心湊泊所以不悟後乃直下承當故乃大悟師遽舉拳揮案一下勵聲曰恁麼汝今大悟耶印擬議師便痛罵趂出印直汗流浹背於茲憤志力參萬曆壬辰間歸白馬僧問如何是西來意師曰兩頭燒火一頭煙師手中嘗執鼗鼓一面書矗子一面書奔字凡應機多舉而搖之示寂塔於龍神山滴乳曰據永覺賢傳真寂印公塔銘受記莂於師印有語録乃細門警訓行世徑山下第十四世徑山廣禪師法嗣建寧府普明鴛湖妙用禪師杭州海寧鄭氏子年七禮興善濟舟為師受業於南明和尚謁無幻請益參禪之要一日於徑山禪堂偶閲思益梵天經注有省即呈偈曰鐵壁銀山誰敢摧賊身驀地拶將來相看元是舊相識當下慚惶笑臉開呈明明見而呵之自此誓不作偈頌單提本參而自逼拶南明因病篤舉香嚴偈問師師才開口明便喝師復擬開口明又喝師點頭石門雲頌曰珊瑚盞盛靈龜血更酌茶蘼茜翠香因憶王喬雙羽健鬖一醉罄壺觴師侍南明明問斷頭船作麼生架三腳驢作麼生騎師低頭下去明深喜尋付偈曰無傳無受法無傳無受心付與無手者掣斷虗空筋石門雲頌曰子陵灘下老漁翁展轉拋筌力已窮剛獲赤鱗巖上去一聲雁落碧波中師雖荷大法終不自肯後因閲羅湖野録至白雲提省五祖處始得脫然無礙石門雲頌曰及盡今時踞虎頭揭天聲價有誰酬其中更有深秋意海上清浮玉一鈎上堂僧問如何是古佛心師便打曰如何是學人心師曰欲攫遊龍蝘蜓竟上曰畢竟如何師連棒打出下座空諸性頌曰桃花流水杳然去別有天地非人間堪笑漁翁成鈍置扁舟何處探仙湲提正令髑髏穿吹毛凜凜逼人寒師訪湛然和尚師問目前無法意在目前其旨如何湛云聞令師出關是否師曰不是目前法非耳目之所到又作麼生湛揖云請出我要止靜師便出徑山進頌曰狹路相逢一段奇灼然賓主禮無虧就中便有些訛處不是苦心人不知牧公謙頌曰大鵬搏飈蒼龍出海動弦別調旁觀色改相語相攜自縱橫明州有個憨布袋無依頌曰鳳管鸞簫隔采霞不知牆外是誰家重門深鎖無尋處徑有碧桃千樹花師訪密雲禪師雲豎拳曰見麼師曰見雲曰見個甚麼師曰大家在這裏雲休師拂袖便出石門雲頌曰平展家風兩不虧翱翔九萬各稱奇雲犀若解翻身轉白鼻崑崙笑滿眉師與雪嶠大師玩月次嶠指月曰者半個在那裡去了師良久云會麼嶠曰也只得半個師曰者半個在那裡去了嶠亦良久師曰也只得半個相與大笑徑山進頌曰眉端挂劍寒光如電互換臨時穿楊之箭咄何似秦時𨍏轢鑽主峰法頌曰夜夜蟬蜍挂碧天清光何處不周圓都來弄巧翻成拙彼此瞞頇見一邊吼山震頌曰峩眉山月半輪秋影入平江浸不流此夕管絃休接拍風情恐動玉關愁暗齋黃廉憲升任廣東入山作別同曰臨行一句乞師指示師曰三千里外逢人不得錯舉升座若論佛法普明無下口處今日偶見新山門拏我拄杖子浪蕩遊行穿過東子嶺直到火燒橋失腳一跌落在深溪幸舊佛殿出手相扶以致到家穩坐新山門見拄杖浸亦不曾乾打又不曾溼將謂別有奇特所以叫屈要山僧剖斷人天衆前不敢囊藏新山門三十棒舊佛殿三十棒何故法令之初償罰要明下座中元黃蘇門朱聯嶽二孝廉請上堂云法身流轉於五道業纍繫墜於三途苦果恆新輪回不息故我大覺世尊憫物興慈緣赴感運般若智渡迷津而登覺路導滯魂以證無生汝等諸人欲乘大願於斯領略於斯徹證何物不濟何苦不離淨土穢邦不出臺端慈雲忍水總在方寸其或未然更須一念心清淨一念心光明一念心無礙心清淨是真佛心光明是真法心無礙是真真佛無形真法無相真道無體三即一一即三此猶屬名言未是究竟真正道流須向那邊覷破轉過身來纖息鵬程直到箇裡淨裸裸赤條條一肩擔荷三世諸佛十方菩薩乃至西天四七東土二三並天下老和尚總不出此向上全提渾無趣向且中元普濟一句又作麼生喝一喝云頭頭盡是光明藏處處無非解脫場萬如禪師請上堂僧出師驀竪拂子云會麼僧云恁麼則直截當機舉四衆盡知恩師打云獨你不知僧便喝師云者喝落在又喝師又打乃竪拂子云大衆會麼者箇親從明先師處得來先師從車溪移下挂搭遡自涓涓田黃面瞿曇在靈山會上拈花示衆惟迦葉破顏微笑瞿曇曰吾有正法眼藏涅槃妙心實相無相微妙法門不立文字付囑與汝汝廣流傳勿令斷絶自是展轉至二十八祖達磨大師以震旦多大乘法器航海西來六傳曹溪法衍二派曰青原曰南嶽嶽又四傳而至臨濟濟十七傳至斷橋橋十三傳至我南明先師先師付託於病僧延至今日恰我如如長老敦請病僧升座舉揚向上宗乘雖是據款結案也要諸人共知且道知箇甚麼良久瞎驢妄受靈山記遞代相傳到此時復舉芭蕉示衆云你有拄杖子我與你拄杖子你無拄杖子我奪却你拄杖子師頌曰從無客賜雪中炭確有人添錦上花損益非干與辱世情偏向有錢家擊拂下座嘉興諸師同如如微禪師送源流法衣布衲等至請上堂果子嶺頭火燒橋畔有則莫大因緣不是倒曳橫拖亦非順水把篙大衆會麼驀拈法衣云此是唐朝宮中所製遞相傳遠無端鈍置病僧病僧撇向𡏖𡒁堆頭冷眼亦不相對蓋有金粟密兄在今日拈來重新光彩正是祖禰不了殃及兒孫拈拂子云指揮舊麈尾野干多驚怕又拈法卷云惟有這箇無用處惹得時人添話去年有箇白拈賊未曾見我先竊下如今且向靜處收藏他日有箇踏翻船子拂袖便行底定是鑽龜打瓦諸大德不得覷著覷著則瞎復拈拄杖云舊店斯開衆中還有識貨者麼僧出禮拜起師連棒打退復舉大通智勝佛十劫坐道場佛法不現前不得成佛道師頌云獨坐幽篁靜理琴林深花雨晝沉沉不知春到時多少祇見簷前翠靄深石雨禪師同衆護法請升座即心即佛猶是誵訛非心非佛可無趣向不是心不是佛不是物穿花蛺蝶深深見取不得捨不得不可得中恁麼得點水蜻蜓款款飛普明恁麼舉揚㧓著靈峰癢處憶知拋家散宅闊步大方峭巍巍孤逈逈淨裸裸赤灑灑踏倒諸聖頂𩕳把住凡靈要路雖然有時一任把住有時一任放行有時放行中把住有時把住中放行還知栴檀林裡純是栴檀獅子窟中無非獅子麼衆中或有箇伶俐漢出來道普明無端露布靈峰蘊底山僧但向伊道祇因曾與同床睡是故深知被底穿除夕天寒作九歲殘須守舉杯拈果大家知有大衆且道有箇甚麼者裡薦得不妨拈尾作頭向三條椽下七尺單前擦褲磨裙忘餐廢寢然祇個事不在動用中亦非眉睫上所以趙州凡見僧參便問曾到此間麼僧云曾到州云吃茶去或云不曾到亦云吃茶去院主問和尚為甚曾到不曾到俱教吃茶去州呼院主主應諾州云吃茶去趙州主張箇事與衲僧平貼商量院主不識好惡至遭一杓臭水普明者裡不管他吃茶不吃茶只要伊單刀直入一僧便出師喝一喝曳拄杖下座元旦上堂古道修然回鳳曆堯歌舜頌樂無疆雲籠丹桂金莖秀雨冰瓊林玉葉長崇禎壬午十月十一日辰時索筆書偈曰生也錯死也錯鐵獅掣斷黃金索擲下筆云咄遂寂世壽五十有六僧臘三十有九茶毗塔靈骨於本山齒塔興善順治間遷骨塔於興善與齒塔相望浮山智禪師法嗣妙峯徹庸周理禪師雲南人其家世力農幼歲出家質鈍語蹇因禮觀音號豁然大悟十八歲見頓悟要論維摩經知所用心處又以空觀習定大有得力處及讀大慧中峯諸書乃知用無所用得無所得處而未敢足也邂逅密藏和尚印證四楞始覺貼地丁巳謁天童悟童一見便問萬里到此費却多少草鞋錢師曰某甲乘船而來童曰來此作甚麼師曰有事借問得否童曰你在甚麼處師曰和尚還見麼童取杖師便喝童打師接住送一送童曰你作甚麼師曰和尚要杖便送還童大喜師機語往往例此而氣吞諸方金陵諸縉紳增城葉公修齡楊公等輩為方外交升座示衆云大衆還會麼釋迦老子來也若也不會山僧為汝諸人饒舌去也祇如教中道法性遍在一切處一切衆生及國土三世諸佛無有餘亦無形相而可得又道天上天下無如佛者既道無形相而可得又謂一切無有如佛者汝等諸人作麼生商量良久云善來世尊安然而住拈拄杖下座上堂上前一步不如退後一步上前一步死退後一步亡只如不進不退未免死水浸殺諸人作麼生是出身之路崇禎丙子年入寂有谷響集行世白馬彖禪師法嗣黃州西陵天臺聞谷廣印禪師別號掌石嘉善周氏子父珊母趙氏夢禪率甲士護門覺而生師兒時左眼角常有塔影父命習儒不願乃送杭開元剃染一日指法界圖問其師曰十法界從心生心從何處生師不能對時儀峯結廬清平山師往參理前問峯曰汝要會須從妙悟始得乃令看雲門露字久之閲七賢女遊尸陀林話忽有省見峯峯舉丙丁童子來求火話詰之曰青峯法眼一般恁麼道為甚有悟不悟師曰初以識心湊泊所以不悟後以直下承當乃大悟也峯舉拳揮案勵聲曰恁麼則汝大悟耶痛罵驅出師直得汗流夾背自是益力參究年二十四會峯還蜀師乃謁無幻單丁法華山禁足白雲峯下於亮座主參馬祖因緣未決一日觀黃瑞香花忽大悟述偈曰却是虗空講得經碌磚瓦礫正堪聽向來扭揑娘生鼻錯認葫蘆作帝瓶於是首衆坐禪徑山蓮居永慶諸處萬曆壬子興復真寂戊午退隱楚之黃安天臺次於建寧創寶善晚歸真寂崇禎丙子臘月十七示寂塔全身於孔青山之陽壽七十一臘五十八
