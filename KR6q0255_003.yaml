body:
  text: 清嗣祖沙門江州真在編嗣法門人齊安機雲續徑山下第九世太崗寧禪師法嗣杭州天目寶芳進禪師幼習儒因與同學會文覩芍藥花有省從坦然披剃坦誨以栢樹子話徧扣禪宗自謂諸方無出格鉗錘一晚在天界佛殿經行聞燈花𪹼如雷震相似尋謁太崗便問如何是西來密密意崗下禪床擒住曰西來無意你道此間是什麼意師無對如是寢食俱忘一日登廁聞隣僧敲籌作聲忽然大悟乃懷香入室崗一見器之付偈曰祖祖無法付人人本自有汝受無付法急著傳於後金明旭舉因緣畢乃曰夷峯鉗錘嚴密門墻固不通風非天目老人亦不能破家蕩產大眾還有知此消息者麼良久卓拄杖下座徑山進頌曰大地山河驀入官松風水月不相瞞滔滔只要源頭活何慮人間滄海乾石門雲頌曰層巖傑閣襯仙遊襯得飛仙到上頭一脚踏翻生鐵甕春山花放酒盈樓上堂拈花微笑節外生枝面壁安心𦘕蛇添足山僧這裏無禪可參無道可學直教一箇箇成佛作祖去汝等還信得及麼良久拍膝云劍號巨闕玉出崑岡上堂截瓊枝寸寸是寶窮秘藏點點是金自出洞來踞虎頭把虎尾千個萬個只知陣後說兵書若龍是門躍過底天目有三十拄杖自領出去上堂舉天目禮和尚曰季冬極寒萬木短殘惟有梅花十分清韻野橋流水外茅舍催籬傍山僧不會東皇意三嗅寒香立晚陽師曰若作佛法會大眾將火把來照照者漢面皮厚多少若作蜩蟲小技會又道野橋流水外茅舍短籬傍新天目未免狗尾續貂今冬極寒柴炭俱難凍得泥牛脚縮石虎眉攢翻身北斗面南看出頭乾外誰是我般般示眾舉月溪垂問為甚鐵牛眠少室師頌曰高名不借金玉宣同子輿懷寶遊諸國其賴安仁君子風僧參師云你道山僧眉毛落却幾莖僧云總不見得師云參學高流眼在甚麼處僧云乾坤大地全在裡許師乃喝出示眾舉古庭堅因無際問子別我在甚處堅曰佛祖行不到處際曰還許人來否堅曰坦然無礙因緣師頌曰水邊林下舊生涯土凳柴床意味佳歸興忽然動昨夜謾將客思寄烟霞正德十四年仲冬廿四日說偈別眾茶毗得五色舍利無數墖於本山天淵源禪師法嗣金陵祖堂興禪師上堂僧問如何是佛師云靈龜曳尾曰莫便是麼師曰杜撰禪和住長墖示眾長墖既老且病不能傾心吐膽長篇闊論謙悞汝等亦不要汝等廣知解透公案如本參疑情便要和身拶入直向那邊更那邊立地回覰始知世間產業資生皆從自性流出此猶是合頭語古人謂之繫驢橛亦謂之貼肉汗衫在今諸方往往坐在個裡佛法垂秋此其兆也在我長塔門下參要真參悟要實悟唐喪光陰殊為可痛珍重金陵棲霞突空昇禪師參天成不契謁太崗崗曰甚處來曰天成曰天成鼻孔多少長曰與和尚一般上堂法華道我為法王於法自在又道是法住法位世間相常住釋迦老子大似淹耳偷鈴棲霞前是山門後是佛殿左是厨庫右是僧堂且道阿那個是常住底相試出通個消息看良久云萬里片雲飛始盡一輪明月挂烟蘿德山安禪師法嗣南嶽春山崇景禪師上堂舉臨濟示眾曰汝等諸人赤肉團上有一無位真人常向諸人面門出入汝若不識但問老僧時有僧問如何是無位真人濟便打曰無位真人是什麼乾屎橛師曰臨濟大似一頭驢要見麼咄良久曰一頭燒火兩頭烟兀兀難藏個白拈樓碎窮年山鬼窟依然華藏水連天西竺中天表禪師鳳翔人本儒家子幼歸釋氏後禮水晶菴無著為師謁古心機契上堂個如露地白牛白頭角崢嶸赤日赫走向雪山深處眠幾回入草尋不獲忽尋獲鼻孔依然欠扭揑天真善禪師法嗣太湖法華鏡堂明禪師示眾舉高沙彌看藥山山曰你來也曰是山曰可煞濕曰不打者鼓笛雲岩曰皮也無打什麼鼓道吾曰鼓也無打什麼皮彌曰大好一場曲調師曰藥山父子大似丹鳳冲霄翔翱六口雲巖鼓上作活道吾皮上作活正眼看來二俱口口在若是生機之手別有道理洞山惠禪師法嗣嵩山別傳宗禪師示眾巖栖㵎飲目雲霄只有松風伴寂寥醒眼滄桑多劫夢看來天地一秋毫仰山道禪師法嗣蘄水華桂山能仁秋月澄禪師僧問如何是華桂境師曰五葉千燈秀曰如何是境中人師曰雙眉聳半空僧問盡大地是箇火坑得何三昧不被燒却師曰此去尤河將八里八峰聞禪師法嗣月潭澄禪師天順初住蘇之西禪晚遷薦福興陽澤問不落古人窠臼請師速道師隨聲便喝澤曰此是古人機用更乞曲施誘廸師連喝兩喝澤曰祖師玄言忘功絕謂出格人來如何提携師曰木奴雙义髻出語不慚惶澤曰與麼則相逢不抵揖各自逞家風師曰叱退文殊消息盡松風韻罷欲誰彈師付無聞鎧偈曰蒙山三關八峰漏逗吾展付汝永光橋後復囑曰宜飽研憨飲接續吾宗末後示眾大機現前來風自辨扣鑰衝關垛生招箭七佛以前消息諸禪德作麼生體取良久奄化三祖天然銳禪師因性空舉乳源上堂西來的的意不妨難道眾中莫有道得者麼出來試道看時有僧出禮拜乳便打曰是甚麼時節出頭來便歸方丈你作麼生師曰和尚曾問甚麼人來空曰不會師作掀禪床勢空曰西來的的意聻師曰濵兄若進方丈和尚莫說某甲答不得此話空曰這僧有喫棒分無喫棒分師拂袖便出齊安石門黃荊濟舟濵禪師上堂回頭轉位直須戴角披毛喚作水牯牛千聖萬賢無出頭處以拄杖畫一畫云出得者個不妨顯些子作略石門雲曰直饒出得更參三十載昭覺無礙通禪師初參通無極白古巖澂月溪俱不契後謁八峯峰誨以有句無句話參究旬日有省住後雲水四至上堂魯祖常年面壁秘魔終日擎杈臨機不解通變驢年未許到家上堂大道無向背至理絕言詮要識安身處泥牛海底眠古溪澄禪師法嗣成都西宗祐禪師上堂橫按拄杖曰父母未生前也只明者箇父母既生後也只明者箇竪起拄杖云大眾看看箇是甚麼熟碗鳴聲遂擲下歸方丈𣵠州金山寂菴湛禪師示眾昔靈源謂圓悟曰衲子雖有見道之資若不深蓄厚養發用必峻暴非特無補教門將恐有招禍辱山僧最初在月溪會裡一十三載方與個事打作一團始無間斷得非深蓄厚養發用安有今日也汝等晚學若不深蓄厚養得少許自足欲廓神機終難極妙又安有補於叢林哉龍門悟禪師法嗣司空碧天朗禪師僧問如何是祖師西來意師曰月穿潭底靜風過樹頭搖示眾祇箇事不是容易底昔在大方參見數知識問他禪道宗旨儘有說底衲子舉公案徵詰差別亦口吧吧底山僧將謂佛法止此反到龍門遭渠一拶好像布袋盛菱角一齊敗露道流要續佛祖命脉要明道眼能識邪正其餘殺人活人機要非平日之溫研一旦對機對境自然過去不得玉峰乾曰近日學者多恃聰明不知者般工夫又不明教理惜哉性空悅禪師法嗣金山東巖亮禪師一日定中聞鷄鳴有省述偈呈空曰狗子佛性無有赤脚髼頭亂走社散扶歸鄭三原是李二醉酒空笑而肯可上堂一切法不有一切法不無會得轉身處東壁挂葫蘆大雲興禪師法嗣黃州師子巖玉峰鐵牛堅禪師在大雲處得其洒脫隱於桐山辟穀止食蒼术一日別峯過訪密囑同行焚其菴請師南巖未幾至白雲訪鑑和尚乃就齊安禪師舊基結茅一時衲子雲至遂成伽藍師潛機密用人無知者後無疾坐化墖於寺左石徑禪師法嗣萬松曉堂滿禪師久依石經一日偶閱演祖謂郭功輔曰人之性情固無常守隨化日遷自古佛法雖隆替有數而興衰之理未有不由教化而成昔江西南嶽諸祖之利物也扇以淳風節以清淨被道德教以禮義使學者收視聽塞邪僻絕嗜欲忘利養所以日遷善遠過道成德備而不知今之人不如古之人遠矣必欲參究此道適石經至師問如何是此道石以拳驀口築之師良久石曰會麼師曰不會石曰好箇不會語未卒又築一拳師乃大悟無相真禪師法嗣金谷巖大華嚴寺南宗勝禪師初依廣恩次謁浮山執瓶巾久之一晚禮佛次山問誰師曰某甲山曰作麼師曰禮佛來山曰佛向你道甚麼師曰不曾道山曰你頭不曾點地那師曰下下點地山曰又謂不曾道師於言下豁然開解曰某甲會也山曰你會箇甚麼師曰吐露太分明山便喝師擬進語山曰拄杖不在手放汝二十棒師便出上堂若見諸相非相即見如來釋迦老子從兜率天拖泥帶水下降皇宮脫珍御服著獘垢衣苦行成道地搖六震天雨四花將謂是箇人若是諸相非相即見如來太遠生以拂子上下指曰天是天地是地山是山水是水且道如來在甚麼處豈不見五天一隻蓬蒿箭攬動支那百萬兵不是雲門行正令幾乎錯認定盤星天順甲申間纂佛祖宗派圖立於嵩山會善戒壇大殿前正續明教大師傳法正宗記為天下禪宗萬世祖龍淨慈休休禪師法嗣杭州昭慶寺雪庭禪師字幻寄仁和桂氏子生於景泰丙子患痘風雙目短視夢中感金神使令出家母兄不𠃔成化間參休休翁於仙林寺一見契合遂出家受無字話十七剃染二十九登具三十五受休休翁印記又四年侍休於淨慈四十七開法昭慶上堂舉僧問雲門不起一念還有過也無門云須彌山幸遇此僧當機不薦蹉過雲門直至於今欄街塞巷無存放處此僧若也下得一語道某甲者裏安放不得且請和尚掇過一邊非唯自己千古之下作箇自在快活間人抑且拶得雲門忙手忙脚撒了收不得收了撒不得豈不丈夫然雖幻寄與麼也是勞人不少且道還有安放處也無自代云看取雲門道底性空覺禪師法嗣荊州玉泉能關主初參祖源海後依投子一日問有佛處不得住時如何子竪起拂子師曰無佛處急走過又作麼生子放下拂子云會麼師曰不會子曰兩頭不著千聖難窺這箇且住古人道藏身處沒踪跡沒踪跡處莫藏身意旨如何師曰不即不離子曰不即即箇甚麼不離離箇甚麼師擬對子便打一日因鷄飛徹見投子用處示眾昨夜兔角起佛見今日龜毛起法見一齊貶向二鐵圍山眉稜與太虗相扭大海與須彌鬬額其餘王風主水者忍氣吞聲且道能上座還有罪過也無吐舌云拔廬山黃龍寺徹空通禪師示眾拄杖子穿却釋迦彌勒鼻孔文殊普賢運神變現覰也不敢覰著黃龍門下莫有腦後拔楔者麼咄屙屎送尿漢是你錯用心萬曆間為慈聖皇太后祝遐詔至奉天門賜大藏供奉至今存焉南竺橘禪師法嗣三河寶鑑無聞明聰禪師上堂十五日已前麻纏紙裏十五日已後拋頭露面正當十五日夜半庭前屈膝坐毛頭星現恰臨門撞頭磕額底悄悄看示眾盡大地是沙門一隻眼汝等諸人向甚麼處屙示眾望州亭與汝相見了也烏石嶺與汝相見了也僧堂前與汝相見了也山僧今日亦然有相見的出來麼一僧出師靠拄杖下座正德壬申七月朔二日入寂世壽六十有三太初忍禪師法嗣華亭無涯順禪師上堂龍吟枯木鐵笛無聲踏翻船舷將謂別有順上座只好捕風捉影還信麼二十年後有人證明師後二十年果示寂天目秀禪師法嗣南嶽雪巖清禪師依荊璧扣心法不敢容易入室一日同澄禪師禮拜次師問三不是復擬開口璧以手掩之師忽然省入次謁天目秀夾山覺師知法無二印後結茅于古頭菴側示眾舉斷橋倫和尚上堂云叢林冷冷無甚今時諸方老宿雖則煨幾塊死柴頭各自煖熱門戶其奈東挑西撥橫抗竪吹和自家底一齊烏了山僧者裡不問大箇小箇乾箇濕箇收拾堆在爐中火種星兒深與埋著待伊時節自到大眾時節到也以拂作撥火勢云嗄烟𦦨逼人師曰用盡自己心笑破他人口又曰好箇話端只是國清拈弄不出清上座今日與他拈出也拈拄杖云大眾還見麼一僧出師曰不是龍門客切忌遭點額以杖約退下座印空海禪師法嗣東滄證果如福禪師參寶月途中述偈曰古徑迢迢任縱橫擡眸跌足可憐生只