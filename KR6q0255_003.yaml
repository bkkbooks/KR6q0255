成佛唯在直下體取子若信得及可放下萬緣參個一歸何處師領旨後聞鷄嗚有省即薙染石門雲頌曰夢乘口鶴登金闕一簇仙風生兩脇邸店寒鷄纔唱曉金烏破琉璃國金明旭頌曰淺碧漸流春日暖仙舸泛徧又乘騎道途不盡經華眼勒馬歸來月轉西微塵盛頌曰三番擬透禹門浪身在洪波隔迢遙纔得春風通一線擎頭戴角直中霄野翁付師法偈曰非法非非法非性非非性非心非非心付汝心法竟掩關示眾三十餘年參請宗匠問法皆云無說問佛皆云無相幸得無相無說不覺頓空伎倆抝折主杖拍雙空手入玄關坐看陰陽消長偈曰窮子還歸長者宅善財參遍雜華林大千收拾毫端內推出口空掩上門啟關自結玄關自活埋自吾閉也自吾開一拳打破玄關竅放出從前這漢來上堂眾集師良久喝一喝曰禍出私門便歸方丈上堂今日佳節七月七通身收拾巧來吃絕妙奇能一併吞盡盡勿留些影跡向來弄巧喪天真從今抱拙守愚直騰雲駕霧總成空百巧不如一老實如何是老實一句二便二一便一新晴久雨初晴人皆喜悅綠柳舞薰風黃鶯啼不輟萬古祖師機一時都漏泄直下會得來依舊沒交涉何故一朝樹倒鶯不來莫把烏龜喚做鱉梅雨梅風拂拂梅雨霏霏須彌山頭爛額香水海面皺眉池塘蛙鼓響如雷諸人會取西來意於斯薦得方知人人是五祖處處是黃梅大解脫門原無關鑰實際理地本是平夷若也未明任爾百鍊薰修徒自辛苦何也祇為他眼邊耳畔覓黃梅依然拋却祖翁田地示眾言前薦得已天涯句下承當路轉賒一擊鐵圍如粉碎海天空闊雁行斜除夜時窮何似日窮好月若窮來歲亦然三十六旬口過了東村王老夜燒錢老漢並無一物應個時節因緣拈拄杖曰祇有這個無窮無盡歷劫經年今夜隨時送去免教涉蔓口牽擲下曰歷劫得來今斷送拍雙空手接新年元宵畫角聲中薦得觀音未是作家彩燈影裏知歸室利謾誇好手恁麼告報與諸人也須笑破虗空口禪流若也未瞥然再看鰲山顛倒走參示眾鴻蒙未判天地未分先有一物時人呼為正法眼藏亦名涅槃妙心今在諸人六根門頭顯現四威儀內昭彰拈拂子曰見麼若見通個消息講師參師問經前一句逼塞虗空經後一句充滿天地包括一句函葢乾坤正恁處時向什處下口講師無對無幻補帳次師掃地至問曰做什麼幻曰補帳師曰誰帳要汝補幻曰和尚得恁麼惱亂人師便打幻作掃地勢師持帚而去俞居真參師曰聞居士在天心書院悟得些子氣息是否俞曰是師曰氣息聻曰在和尚開口處師曰非干汝事俞向前抉手師曰這個是書院裏學來底俞退身就位師曰乃見一斑俞曰某甲日用不忘者個師曰且得途中受用俞作滿空雲水有生涯句呈師曰雲散水枯時生涯在什麼俞擬議師彈指一下曰在者裡俞於此有省石門雲曰一座天心書院多少文章秀士在裡面光風霽月弘讚嘉猷無端遭滿空雲雨致令昧心者戀金馬步長安大似咫尺望帝鄉千里若是石門纔問伊雲散水枯他若擬議驀面好掌管取天心書院底一齊洒脫湖邊步月次無幻至師曰明月與清風水天同一色人人在個中祇是出不得幻曰打草驚蛇作甚麼師曰汝又作麼生幻曰看脚下師大笑便歸師與無幻經行次聞風𢷾槎槤樹聲師曰此樹風來獅子吼風寂便涅槃幻曰樹倒風息時獅子在什處吼師良久幻曰大好吼即不是獅子師便掌鐵容玄頌曰公子邀遊月滿樓佳人更調唱伊州便將席上春風起直到瀟湘水盡頭陸五臺舉僧問夾山承和尚有言二千年住此山未嘗舉著宗門事至束裝前去因緣曰此僧前曰掀床後日灒去一言無措和尚可代一轉語得麼師曰者兩個有頭無尾漢夾山當此僧問時即曰我向來不曾道著喚侍者擯出此僧不失乎有前無後賊過張弓者僧次日當夾山舉話處即向空中打兩拳推一推埋了也亦免陣敗逃回曰是師曰且道者僧埋自己埋夾山曰俱埋了也師曰仔細切莫累我陸大笑師曰去也陸曰妙妙龍興在曰作家宗師天然猶在廟廊貴客今日偶逢同心鼓舞扭結鴛鴦直得席割蒼梧樂奏鍧鍠使當日夾山極力處有今之陸公法道不致寂寥敬畏拔劍相助却被俗官看破萬曆己卯仲冬付法於無幻訖且謂曰來歲中秋五六日間吾欲行子宜來於期幻至師示微恙說偈曰生來死去空花死去生來一夢皮囊付於丙丁公白骨斷橋隨眾呵呵明月清風吟弄佛日方曰皮囊既付丙丁白骨交歸斷橋畢竟將什麼吟風弄月良久云為見烟霞生背面因知星月繞簷楹石門雲別佛日皮囊付丙丁白骨歸斷橋畢竟將甚麼吟弄良久曰長天秋水孤鶩落霞晦牧密頌曰自從踏斷板橋霜茆店雞聲午夜長砧杵重敲聲轉切行人始不費商量師生於弘治辛亥年十月十八日終於萬曆庚辰八月十六日世壽九十墖於本菴石門海禪師法嗣隨州七尖峰大休宗隆禪師青州益都賈氏子一日挑水忘行撞壁有省作偈曰大地山河體性空那分行走與西東偶然撞著無私句萬水千山總一同謁無盡於河南乾明寺機契遂蒙印可室中甞垂三關語以騐學者僧問如何是祖師西來意師云黃瓜茄子其僧不薦至一菴菴主問上座從甚處來僧曰七尖峯主曰有何言句僧曰某問西來意和尚相戲主曰試述看僧舉前話菴主設香遙拜曰大休古佛放光也其僧方悟嘉靖二十一年十一月八日集眾書偈曰三際握來為主杖十方元是舊袈裟泥牛石虎知消息踏破虗空便到家置筆端坐而逝塔於本山斗峯琴禪師法嗣建寧府斗峰天真道覺禪師看萬法歸一有省述偈曰一手拍兮一手鼓無位真人出格舞口中唱出無腔歌三千諸佛同一母往呈古音音可之三角喜禪師法嗣義水高原山二祖南宗印禪師參三角請益趙州置掃撫掌大笑因緣角連打二掌師曰莫當得麼角又打師曰金鍮不辨玉石不分角大笑出法堂一日因僧誦風鈴偈曰銅唇鐵舌太尖新樓角懸來不計春言外百千三昧法因風說與箇中人師有省呈似角角可之龍門性頌曰不是人斑是虎斑兩回牙爪露巑岏而今要見趙州老剎剎塵塵禿帚談護國鐸頌曰荷葉羅裙一樣裁英蓉笑臉兩邊開直入池心看不見歌聲必定有人來西林頂禪師法嗣浠川華桂山能仁濟舟洪禪師九江桑落人禮四祖解聞為師一日送亡僧感絕世緣參西林林教看三不是領旨一日僧參師曰什處來曰黃蘗師曰黃蘗有何言句曰甞謂眾曰只教汝別求易若教汝休歇最難師曰有幾人會得曰常春大覺師曰上座聻曰某甲不會師曰實不會耶曰實實不會師曰明日速回伊必為上座說僧稟命返黃蘗果於言下契悟能仁在曰兩箇黃鸝鳴翠柳一行白鶯上青天萬曆辛丑年中秋翫月次師指月謂心安曰晦則吾行矣至三十日沐浴坐脫墖於寺西天寧濟禪師法嗣嘉興胥山雲谷法會禪師嘉善懷氏子參法舟舟令看念佛語一日受食碗忽墮地猛然有省偶閱宗鏡錄大悟舟特著臨濟二十七世源流付之僧問如何是祖師西來意師曰有水皆含月無山不帶雲曰莫更有奇特否師曰不得將龜作鱉憨山清北遊師出衣偈付之囑曰吾之大法在汝肩頭慎勿容易子當珍重山唯唯拜受師終有大光明垂於後世墖於棲真寺之西銘係袁了凡作按牧齋錢公作清師塔銘後語其略曰然我大師之續脉於祖也按師自述得雲谷向上巴鼻深參力究以至築著旋嵐偃嶽之句方疑團沐釋時有鼻孔向下之偈及鐵牛入水之談葢從是悟入故多別參一無曰嗣獨於谷師法感已深尚敘荷法準此師本雲谷無惑當自雲谷傳法舟濟遡推至臨濟大師則師嗣為二十八世雖然而的法淵旨機用施設實圓洞五宗任運不立絕非死殺一家之振何則派發於源莫葢於曹溪之後五宗過盛則衰於盛昭代之初劍去久矣刻舟而覔固克肖之捉死蛇耳豈能力捄斯道哉滴乳曰世之搶行奪市識者鄙而笑之况宗乘筆削慧命攸關乃有確據者如東林悟之八峯潭所出天寧宣宣出吉菴祚祚出天寧濟濟出雲谷會會出憨山德清此師師授受祖祖相傳黃童白叟之所共曉近見少林續燈編入大千潤下是欲開天皇天王之諍端於後世也南㵎續燈存稿誠禪宗繡史法門金鏡亦見編入未詳因少林書出在前存稿流通在後故姑存以待具正法眼者若張無盡點出湛堂金剛眼也其足下兒孫罔知所自出之祖亦學步邯鄲直令識者鄙而笑之予詳考清公南還會師物化遂建塔院募田以永守塔計清公立師神主不曰明圓寂本師雲谷會禪師之神主乎傍勒得法弟子德清立乎又紫竹林顓愚衡公集所述淵源錢牧齋作清公塔銘有公嫡嗣雲谷之言何一總抹殺緣清公不即登祖師位瓣香拈出致令門外漢妄下語耳嘉興精嚴寺冬溪方澤禪師嘉善任氏子參法舟一日舟舉龍潭參天皇語至何處不指示心要有省天寧解制秉拂佛法雖徧一切世間而未嘗有絲毫透露作麼生結雖未嘗有絲毫透露亦未嘗有絲毫囊藏作麼生解故知百丈大師曲引初學為此方便誑諕之辭其實不能結不能解也設有孟八郎漢出來道我能向百丈大師結不得處一結結斷直使天下衲僧忘前失後求出無門亦能向百丈大師解不得處一解解開直使天下衲僧七狼八藉竄身無地却甚奇特諸上座彼既丈夫我寧不爾良久擊拂子一下云吽薦福禪師法嗣襄陽府龍池寺默菴慧聞禪師語具無聞章師舉僧問雲門如何是雲門一曲門曰臘月二十五師頌曰宮商不落調還高千古淳音法帝堯明月清風無價買盡情分付與漁樵松竹寬禪師法嗣伏牛無礙明理禪師汾州和氏子參松竹蔓大方和尚隨眾打七有一聲虗空碎獨露法中王之句後同月菴大圓入終南一日菴舉高峰銀山鐵壁語師頓悟述偈曰一覺心空疑便消拈來放出自逍遙運水搬紫全體現萬象森羅一性包又曰玅體如如本自空更無一物可追尋須彌頂上波翻浪太陽終不離乾坤過大方求證方付偈曰付汝金襴廣利生空宗一震海河清性包萬象人天仰佛祖門中闡化機
