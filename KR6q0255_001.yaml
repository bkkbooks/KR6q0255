body:
  text: 清嗣祖沙門江州真在編嗣法門人齊安機雲續大鑑下第二十世臨濟第十六世杭州徑山無準師範禪師劍州梓潼雍氏子九歲依陰平山道欽出家經書過目成誦紹熙五年冬登具明年次成都坐夏正法遇瞎堂高弟名堯者請益坐禪之法堯曰禪是何物坐底阿誰師晝夜體究一日於廁提前話有省石門雲曰首座善舞太阿使百尺竿頭做伎倆底一見便能死盡偷心乾坤別搆所謂心不負人面無慚色師謁育王佛照照問何處人師曰劍州照曰帶得劍來麼師隨聲便喝照笑曰者烏頭子也亂作破菴住秀峰日有僧入室菴打逐至法堂時師解曰禪和家爭禪亦常事耳菴曰豈不聞道我肚飢聞板聲要喫飯去聻師聞不覺汗流夾背破菴為靈隱第一座師復從一日同遊石筍菴有道者請益曰猢猻子捉不住乞師方便菴曰用捉作麼如風吹水自然成紋師在傍大徹東林在曰城門失火殃及池魚牧雲門頌曰城門失火臭煙薰殃及池魚尾盡焚無處更求三尺水好看振鬣上青雲南澗問頌曰氣飲長虹已食牛血漫漫地照人愁因風吹火無多力春滿皇都四百州南嶽際頌曰眉間霜劍倚天寒試展鋒鋩海樣寬石筍路逢沽酒店三杯兩盞破愁顏石門雲頌曰霜飛六月禍私門殃及平民已覆盆南北東西無處去一拳打破鐵崑崙破菴付師法偈曰我若不見時汝應不見見見見非自心自心常顯現未幾破菴過天童掃塔師偕往復拉月石溪同遊台雁至瑞巖雲巢留師分座夜夢偉衣冠者持把茆見授翌日明州清涼專使至師受請入院見所伽藍神茅其姓衣冠與疇昔所夢無異升座開法一香供破菴三年遷焦山期年遷雪竇又三年被敕移育王又三年嵩少林散席徑山朝命以師補處明年寺師逆知其數不動容經意是年冬十月有旨召入內廷上御修政殿引見師奏對詳明上為色動賜金襴僧伽衣又宣入慈明殿升座説法帝垂簾而聽大悅賜號佛鑑禪師三年寺成閲六年復而多助雲至不數年復還舊觀去寺四十里築室百楹接待雲水額曰萬年正續正續西數百步結菴一區為歸藏所上建重閣祕藏先後所賜御翰敞室東西偏奉祖師與先世香火遇始生日為飯僧佛事以贊冥福蓋蜀乳師之先祀遂絶祠奉以旌孝慕上聞嘉歎上堂名不得狀不得取不得捨不得只麼得且道得箇甚麼三人證龜成鱉問石乘頌云滾滾紅珠非眼血紙灰染作花蝴蝶自從夢斷識莊周亂撒金錢飄黃葉上堂若論箇事直是省要易會多是諸人自作艱難自作障礙所以尋常東廊西廊見諸人和南問訊山僧便乃低頭相接其實無他只要諸人識得長老是西川隆慶府人氏若識得便與諸人打些鄉談説些鄉話如今且未説你識得長老且各自知得自己鄉貫還知麼明州六縣奉化八鄉上堂五峰門下百種全無禪床迫窄堂供蕭踈腳下踏著底破磚頭碎瓦片面前撞見底王獦獠李麻胡恁麼薄福住山真箇孤負先哲良久雖然如是更點分明上堂一夏已滿無事不辦遂府盂功州磁碗淳祐戊申秋師築室明月池上榜曰退耕乞老于朝而舊疾適作己酉三月旦日升座謂衆曰山僧既老且病無力與諸人東語西話今勉強出來將從前説不到的盡情向諸人抖擻去也遂起身抖衣曰是多少便歸方丈十五日集衆區畫後事親書遺表及遺書十數言笑如常其徒以遺偈為請師執筆書曰來時空索索去也赤條條更要問端的天台有石橋偈畢移頃而逝東林在頌曰戰罷雄風笑倚樓虎頭虎尾一齊收時人不諳風雲色腦後遭槌孰解羞停龕二七日上遣中使降香賜幣奉全身葬於正續之側塔曰圓照徑山下第一世臨濟下十七世徑山範禪師法嗣台州天台國清寺斷橋妙倫禪師姓徐台之黃巖人母劉氏夢月而孕年十八於永嘉廣慈院落髮見谷源於瑞巖聞麻三斤話有疑一日謁雲居見山堂偶閲楞伽至蚊蟲螻蟻無有言説而能辨事處頓省師往雪竇參佛鑑鑑以狗子因何有業識令師下語凡三十轉不契師曰可無方便乎鑑舉真淨頌曰言有業識在誰云意不深海枯終見底人死不知心師竦然良久忽聞口聲通身汗下於是脫然契證徑山進頌曰漏屋恰逢連夜雨更多愁霧鎖柴門忽然雲盡孤輪湧疊青山插遠層一初元頌曰頂門一擊汗如油捉敗當年老趙州自是黃河連底竭一番驟雨一番愁天巖啓頌曰用盡機關欲斷窮板聲一擊頂門通推開碧落松千尺放出金烏子夜紅藕菴衍頌曰三春鶯囀緑蔭叢渙父從容渭水東畢竟有貪香餌者比來喜不浪施功龍門性頌曰陳雲角曉怒風號蟻穴珠穿戰愈高欲遁賊身無處去一回躍馬便衝霄護國鐸頌曰錦衣公子醉田家倚檻披襟看落霞忽爾風翻荷葉動池心獨露一枝花石門雲頌曰相逢把手御街遊歷亂春光四百州電尾電頭通一線黑風翻轉釣魚舟佛鑑付師法偈曰真理直如絃何言復何默我今善付囑表心本無得鑑移育王師皆分座祇園遷瑞岩後住淨慈室中嘗學萬法歸一以驗學者凡下語不契即趁出高峰於此打失眼睛徑山進曰斷橋老漢固是婆心不免教壞人家男女高峰雖然打失眼睛要且恩大難酬金明要問大衆如何是萬法歸一一歸何處月似彎弓少雨多風東林在曰古佛垂慈血心片片如慈明置劍祕魔擎叉臨濟入門便喝德山入門便棒種種施設要人死盡偷心不落透路瑞岩慣設虎穽牢籠天下高峰如此打失眼睛大似平地撞彩要且不識萬法歸一徑山廣頌曰侵晨出去晚頭歸赤腳髼頭滿面灰無底鍋燒無米飯臭煙烽㶿觜尖吹上堂德山低頭夾山點頭俱胝豎起手指頭玄沙築破腳指頭拈拄杖曰都來不出山僧拄杖頭何以見得卓拄杖曰一葉落天下秋希覺鋭曰德山低頭刻舟求劍夾山點頭剜肉作瘡俱胝竪起手指頭栽角呼牛玄沙築破腳指頭因誰致得大衆要會教忠拄杖頭麼孤月照臨山嶽諍幾多人此中休牧公謙頌曰奇與百怪只在一毫端拈却毫端看霜花六月寒讚夫峻頌曰幾座畫閣瓊樓數條花街柳巷從頭説與遊人總在長安市上濟北弘頌曰西風昨夜到梧桐零落名園思未工婦壻直教歸未得幕簾斜對蓼莪紅龍門淵頌曰細雨斜風一葉舟渠儂逞俊不知休一聲牧笛傳幽谷紅蓼汀前起白鷗上堂舉雲門示衆乾坤之內宇宙之間中有一寶祕在形山因緣頌曰隱隱煙村聞犬吠欲尋尋不見人家忽逢橋斷溪迥處流出碧桃三四花上堂舉慈明室中插劍一口草鞋一雙水一盆因緣頌曰百花叢裏𩏠鞭過俊逸風流有許多未第儒生倫眼滿懷無奈舊愁何上堂荊山有玉獲得者不在荊山赤水有珠拾得者不在赤水衲僧有無位真人證得者出入在面門驀拈拄杖曰會麼幽州江口石人蹲上堂舉達觀頴示衆七佛是性隸萬法是心奴且道主人翁在甚處自喝曰七佛以下出頭又自諾曰各自祇候師曰喚七佛為性隸指萬法為心奴達觀自謂有出身路及平自喝自諾又是奴隸邊事主人翁何曾夢見在大衆要見麼以拂子拂一拂曰曉來一陳春風動開遍園林百樣花悅堂誾參師問臨濟遭黃檗三頓痛棒是否曰是師曰因甚大愚肋下築三拳曰得人一牛還人一馬師頷之誾禮拜師一日入堂見誾危坐屹然師向耳邊吹一吹誾張眸視師欲言師震聲一喝誾後謂衆曰佛法不是小可昔被淨慈一喝只得魂飛魄散臨終集衆入室作書辭諸山及魏國公公饋藥不受又遣人問曰和尚生在天台因甚死在淨慈師曰日出東方夜落西書偈而化金明旭曰淨慈恁麼答話未免俗官看破宜林能別曰不恁麼答亦被俗官看破徑山下第二世天台倫禪師法嗣台州瑞巖方山寶禪師潭陽葛氏子隨父宦遊一日于杭之淨慈飯僧偶閲六祖壇經恍如舊習乃舉黃梅衣鉢因緣問鞏禪師既不會佛法為甚又紹祖位鞏曰不但祖師大有人不會佛法亦紹祖位師曰和尚還紹祖位否鞏曰若紹祖位即會佛法黃龍無上櫺和尚曰大小淨慈答話不了劍叟是曰淨慈大似富嫌千口少貧恨一身多佛鑑奉詔住徑山師與天界日等結侶往參盡得旨要一日忽疑興化四方八面來話遂請益佛鑑鑑曰老僧不能為汝説汝但自看師請益至再終不為説指參石橋師稟命至彼罄其機用橋皆不諾師猛力參究請益至十一度一晚危坐忽覩燈光面前豁然次早入方丈橋曰子捉賊也師禮拜曰賊已收下請和尚驗贓橋舉萬法歸一師答橋亦不肯齋後普請師手忘所舉橋驀拈莧根示曰是什麼師乃大悟圓通究止參和尚落堂舉石橋拈莧根方山大悟因緣問復且你道得力在甚麼處且曰方山在佛鑑得體石橋得用如風吹水自然成紋若謂悟在莧根則埋沒先代參深肯徑山進頌曰莧根拈起骨毛寒好肉無端索灸瘢悟得單傳真祕訣風前總是活人丹東林在頌曰抵死攀鞍不肯休平原奪鼓覓封侯路傍藥餌才拈起化作神仙上酒樓石門雲頌曰洗清凡骨躍龍門振鬣揚鬐鼓要津那畔不棲無影象從教寶藏自甘貧橋付師法偈曰本無迷悟人迷悟自家討記得少壯時而今不覺老即繼橋席凡僧入室概豎拂子曰是甚麼僧擬議直打出二十年少有契其機者黃尖頴戟易禪師曰古人門庭恁麼施設近時搖尾乞憐惟恐蟻不解腥蠅不來臭石門雲曰祇如師僧家識得拂子又作麼生良久彈指一下金明旭拈石門語識得拂子買草鞋行腳無盡燈參師豎拂子曰是甚麼燈亦曰是甚麼師曰與我除却四大別道一句燈從東過西師垂左足燈從西過東師垂右足燈近前叉手而立師以拂子便打燈禮拜金明旭曰禮拜即得要且不識拂子無盡問達磨西來未審傳箇甚麼師曰你道東土人曾少甚麼盡曰既不少神光為甚立雪斷臂師曰止圖破家蕩産盡於言下大悟僧問曹溪水派派朝東瑞巖水為甚流向西師曰上座好惡不識曰比來問水答好惡不識那師曰瞎漢果然不識便打問如何是佛師曰逃人犯夜問如何是祖師西來意師曰正抓著我癢處問如何是般若體師曰八角磨盤曰如何是般若用師曰八角磨盤空裏走結制上堂煽烈𦦨于大千界內直下片雪飛舞舉鉗錘于妙密場中就裏點鐵成金赤沙灘上杖林山中箇箇餐砒霜飲鴆毒冰稜上走劍刃上行所謂鑊湯無冷處汝等抱定枯桐守住死灰何日豆𪹼西菴今日為汝爐內添炭好著精彩上堂橫按拄杖顧視大衆曰彼此彼此便下座上堂諸聖情存見網難透不立階級曠劫無門般若之智常明真如之體獨露諸方學者心地不明皆因邪師雜糅如蠶作繭似蛇戀窟自謂到家不肯見人間有聰明意識卜度儱侗真如瞞頇佛性誠可愍哉師住瑞巖常設三問以驗學者曰真正出格高流如良馬見鞭影而行中下之士何堪冀撑鐵船過海底人為甚麼向針孔裏呌屈髻珠嘯月恆和尚頌曰黃河遠上白雲間一片孤城萬仞山羌笛何須怨楊柳春風不度玉門關既是臨濟大師為甚入拔舌犁耕石門雲頌曰澄潭無水月無緣滿載嬋娥醉碧天蔽垢偶趨金殿過橫身帶惹御爐煙玉峰乾頌曰邊霜昨夜墮關榆吹角當城片月孤無限塞鴻飛不度秋風吹入小單于那邊不立者邊不行截斷中流為甚不住黃尖欽頌曰半夜回舟入楚鄉月明山水共蒼蒼孤猿更呌秋風裏不是愁人亦斷腸護國鐸頌曰直下全提殺活該聲前無路出塵埃海門迸出金星子萬象森羅吼似雷師一日為衆挂牌入室垂語曰南泉斬却貓兒時如何衆下語不契適有一僕在傍曰老鼠做大師笑曰好一轉語只是不合從你口裏出全真請上堂千斤石磙水上浮四兩葫蘆沉到底火燒狗尾豬頭焦南辰竄入北斗裏至元元年正月初七日書偈曰來無一物去無一物盡却今時虗空鐵橛擲筆而逝南華永宗本禪師頌船子公案笑中棄却竹林寺將謂華亭有許多窮性命於橈下喪看來成敗自蕭何雪山法曇禪師臨終謂衆曰老僧有一件事天來大諸人還識麼維那曰不識師推出枕子曰者箇聻便化室中異香經時不散絶象鑑禪師頌洞山不安洞山有路透雲巖絶處教通到者難拄杖頭邊開活路方知不隔一毫端竹屋簡禪師頌鼓山聖箭青童雙勒玉驄嘶淡白春衫緑帶圍半夜歸來花底月金鞭敲落亂紅飛藏室會珍禪師頌洞山辭雲巖掘起藍田一坐墳珊瑚瑪瑙合粧成驢駝馬載休云寶禍及兒孫盡滅門僧問臘月火燒山意旨如何師曰遍尋無莖草竹山如圭禪師脫略異常一日遊佛巖聞風吹殿角鈴聲倚杖脫去茶毗得舍利無數塔於佛巖之陰徑山下第三世瑞巖寶禪師法嗣台州天台無見先覩禪師台之仙居葉氏子也宋咸淳乙丑五月六日誕師少而資性頴秀嗜讀書過日成誦父一日會沙門善公過而識之曰此法器也宜毋滯鄉里率敬信善許諾逮冠從古田垕和尚剃染於郡之天寧登具俾歸侍司旦夕以此道䇿進參方山於西菴師問如何是佛法大義山張口吐舌示之師罔措山以拄杖趂出往參天封珍理前話未竟珍亦打復返西菴途中把滑有省及見山山問汝返何速師曰和尚此時打某甲不得山曰天封與你道甚麼師述途中因緣山又打惟範琪曰方山與麼提持可謂烜赫古今華頂若非臨濟兒孫幾乎打破蔡州石門雲頌曰一箭西沉勢已危更加一箭破重圍幾多撥剌生擒者猶把弓梢伴酒巵師築室華頂精苦自勵因作務次渙然頓釋所疑往西菴呈解山一見契之乃付偈曰此心極廣大虗空比不得此道只如是受持休外覓調實和頌曰九轉靈丹仍化丹紫霞籠壁衆星攢擘開金鼎火光噴傾出直教天地寒萬峰蔚久侍座下師問萬法歸一一歸何處蔚進前問訊叉手而立師曰如何是道蔚曰道無可道師曰不道有不道箇甚麼蔚曰正要和尚疑著師曰疑著即錯蔚曰不疑亦錯師便喝蔚亦喝師曰言無再響蔚拂袖而出示衆風冷冷日杲杲簷蔔花開滿路香池塘一夜生春草堪悲堪笑老瞿曇四十九年説不到阿呵呵拍禪床一下上堂若論此事三世諸佛一大藏教詮注不及天下老和尚拈提不起直饒有傾湫之辨倒嶽之機一點也用不著諸仁者飢則喫飯困則打眠熱則乘涼寒則向火一一天真一一明妙倘得踏步向前論禪論道誤將魚目為珠錯認橘皮為火不見道大機須透徹大用須直截不識東家孔丘翁却向他邦尋禮樂卓拄杖曰錯復舉龐居士問馬大師不與萬法為侶者是甚麼人馬祖曰待汝一口吸盡西江水即向汝道士有省師頌曰一口吸盡西江水鷓鴣啼在深花裏縱饒直下便承當何啻白雲千萬里小參過去諸如來斯門已成就夢裏求形水中捉月現在諸菩薩今各入圓明捕得老鼠打破油甕未來修學人當依如是法彼自無瘡勿傷之也無計較中翻成計較無途轍中翻成途轍殊不知屠房酒肆全彰古佛家風閙市紅塵顯出祖師巴鼻若也舉一明三目機銖兩何啻白雲萬里嗄花開花落任風吹自有清香滿天地示徐直翁長夏獲以同居巖間松下一語一默喜不自勝且道與古人夏中不聞正因兩字是同是別請直翁下一轉語機先著眼未是俊流昔汾陽參七十餘員善知識後見首山問百丈卷席意旨如何山曰龍袖拂開全體現汾又問師意如何山曰象王行處絶狐蹤汾陽於此大悟禮拜起曰萬古碧潭空界月再三撈摝始應知傍有僧曰汝見什麼道理便乃自肯汾曰正是我放身捨命處看他古人終不肯自小結果參禪縱有所省若不見人謂之癡禪悟迹不除翻成籠檻一切處為之禁制坐在勝妙界中前輩謂之鶻臭布衫最難卸却更宜審諦第一不得向黑山下鬼窟裏作活計第二不得向急水上打毬子四威儀內急切用工驀然拶破面門元來只是舊時人更無絲毫為障為礙言多道遠勉之元統甲戌五月一日遺誡汝等出家當行出家之行當念四恩難報信施難消努力以道為重不可虗度時光常住十方僧物為老病故毋得競爭人我增長無明鬪搆是非戒之慎之來日煩大衆早為焚化不須剃頭不用洗浴一爐猛火千足萬足初二日辭世偈云現成句子不妨舉似處空撲落須彌起舞奄然而逝壽七十臘五十即以卒之九日茶毗收舍利建塔於寺西諡妙明真覺禪師之號塔曰寂光杭州鳳山一源靈禪師參方山於瑞巖充堂司一日入室請益趙州勘婆子話有省後住鳳山上堂舉世尊升座文殊白椎公案師曰世尊已是錯説文殊已是錯傳新鳳山今日已是錯舉會麼字經三寫烏焉成馬明州松巖秋江元湛禪師久從絶象遊後參方山得旨偶遊明之松巖愛其清勝不忍去遂趺坐石上俄有二虎踞坐其側若護衛狀師命之伏枕其背熟睡山民異之即其處創精藍以居之師不涉世事法施之外淡如也將化別衆就龕説偈曰洗浴著衣生祭了跏趺晏坐入龕藏花開鐵樹泥牛吼一月長輝天地光復為衆曰十五年後寺當火啓龕則火可止至期果然衆丞開龕師神色如生爪髮俱長天台上雲峰無盡祖燈禪師四明王氏子參日溪詠公於天寧問生死事大無常迅速乞賜指示溪曰十二時中密密參究忽然觸著却來再問師抗聲曰無常迅速生死事大語未終溪便喝師遽禮拜溪曰見何道理便爾作禮師曰開口即錯溪頷之尋參方山得法卓錫上雲峰影不出山五十年洪武二年二月八日示微疾夜將半顧左右曰天向明乎曰未也或曰和尚正當此際何如師破顏笑曰昔德山坐疾僧問還有不病者麼德曰有曰如何是不病者德曰阿㖿阿㖿師良久曰如此喚作病得否衆無語師曰色身無常早求證悟時至吾將去矣侍者執紙求偈師曰終不無偈便未可死耶侍者請益堅乃書偈曰生滅與去來本是如來藏拶倒五須彌廓然無背向投筆端坐而逝丁居士素以針工在方山座下久之冀明本分山惟東敲西擊間毀罵諸方凡有言説皆流俗鄙士老僧不欲以惡毒中汝丁一日剔琉璃有省書偈呈山提起提起放下放下者點光明照天照地山喜其行業淳素乃印可之徑山下第四世天台覩禪師法嗣處州福林白雲智度禪師姓吳郡之麗水人年十五從假禪師剃髮深習禪定遍參無有可其意者復還里之白雲就澄禪師故基築室居之後訪淨慈西峰俱不契晚侍無見問西來密意未審如何見曰待娑羅峯點頭即向汝道師以手搖拽擬答見便喝師曰娑羅峰頂白浪滔天花開芒種後葉落立秋前見曰我家無殘羹剩飯也師曰此非殘羹剩飯而何見頷之師禮拜宜林能曰當日無見祖翁推倒華山壓殺赤縣神州三百八十四家人直教巨靈擡手不及而今舉揚臨濟宗旨石橋綱要教他百千萬億娑羅峯一齊點頭猶未許他何故換骨洗腸重整頓通身是眼更須參石門雲頌曰張騫踏碎崑崙頂雲鎖懸河凍鎖津劫外長風幸有在一時吹綻上林春金明旭頌曰泣發窮途逢驟雨攀鞍抵死到長安隴頭凱奏神明府萬國山河一統看見付師偈曰至大是此心至聖是此法燈燈光不差了此心者達師辭見囑曰昔南嶽受大鑑記莂後得馬祖授以心法針芥相契不在言多勿掉三寸舌誑人須真正見解著于行履方為報佛深恩耳師佩服久之復往長沙見方普雲居謁小隱大至正甲午還福林尋主龍泉普慈遷武峰太守何密菴參師舉白雲謂五祖曰有數禪客自廬山來皆有悟入教伊説亦説得有來由舉因緣問伊亦明得教伊下悟亦下得祇是未在既有悟入因甚未在菴微笑師曰五祖道吾因茲出一身白汗便明得下載清風你作麼生菴拂袖便行師曰居士且仔細菴更不回首復且問圓通白雲舉下載清風密菴拂袖便行意作麼生通曰你如何會且曰莫是他放捨身命處麼通曰如是如是柏山理頌曰尋得桃源好避秦無端却被賊來侵而今匹馬溪前過敗國亡家恨轉深東林在頌曰一曲平沙鋪落雁陽春白雪卒難和子期去後無知己消得枯桐恨幾多洪武己酉詔徵天下高僧建法會於蔣山師應詔會事解嚴由京口過虎丘禮隆祖塔轉至杭州州人奉居虎跑秋趨華頂庚戌春示微疾仍還福林沐浴更衣索筆書偈曰無世可辭有衆可別大虗空中何必釘橛擲筆而逝茶毗舍利五色塔于院西世壽六十七臘五十三鏡堂古禪師法嗣平湖則中度禪師上堂結制來天陰四十日今朝晴明好曬朗雖然臂肘不向外曲諸人分上也要檢點分明上堂秋水潔秋雲白秋到梧桐風瑟瑟江上芙蓉落彩紅幾人夢斷識莊蝶徑山下第五世白雲度禪師法嗣金陵天界古拙俊禪師松陵人少有神聰日記千言搜窮羣典則曰吾儒風規之儀老莊幻化之術惟佛性義理智海淵深吾實不欺若欲窮諸玄辨妙悟真宗無如禪道年二十往越州日鑄寺祝髮遍扣諸方不能灑脫遂結伴歸里立限壁觀九年每三年然一指歷然三指一日忽然瞥地聞白雲門風孤峻學者罕入其室師欣然往謁雲一見器之即留首衆師一日請益從上宗旨雲上堂舉世尊拈花平地骨堆迦葉微笑忍俊不禁二俱翻成特地師豁然大悟以手搖曰止止雲擲拂子下座師隨入方丈雲詰之曰你適才見箇甚麼便與麼師曰若有見可見則辜負和尚了也雲深肯東林在曰當門按劍魔佛形消毒鼓一撾人天膽喪其聞聲不死者原不在數如風穴上堂舉世尊以青蓮目顧視大衆乃曰正當恁麼時因緣首山瞥爾自肯又溈山撥火洞山覩影俱皆聞聲即喪古拙才問從上宗旨逮白雲輕輕撾動毒鼓便解分身塵剎得非靈丹九轉乎石門雲頌曰水晶宮出水晶水太液池翻太液波一夜好風吹不足天明無奈雪深何頴戟易頌曰多年故舊忽相逢逞興登樓話熱衆最是一般難訴處垂垂珠淚透心紅白雲付師法偈曰心中有自心法中有至法我今可付囑心法無心法衆欲推出世師遁迹出山留偈曰半載相依唱祖機幾番談道奉嚴威出山便説歸時路又是重添眼上眉韜光巖壑三十餘年有平生最愛隈巖壑三十餘年懶送迎之句師住南極日單舉無字勘驗來學諸方時號南無字洪武間奉旨剃度千僧至繁昌八峰山衆請東婁山開堂普説示衆禪之一字亦是強名云何曰參在信而已擬議即乖開口即錯若是發心不真志不猛利者邊經冬那邊過夏今日進前明日退後久久摸索不著便道佛法無靈驗却向外邊記一肚抄部如臭糟甕相似是者般野狐精直饒到彌勒下生有甚交涉真正道流若要脫生死須透祖師關祖關透生死脫不是説了便休要將從上諸祖做箇樣子趙州老人四十餘年不雜用心為甚麼事長慶稜公坐破蒲團七箇為甚麼事香嚴老師四十年方成一片為甚麼事乃至歷代真實履踐克苦勵志為甚麼事山僧今日口喃喃地引古驗今為甚麼事諸禪德既有從上不惜身命積功纍德妙悟親證的樣子何不發大勇猛起大精進對三寶前深發重願若生死不明祖關不透誓不下山如是發願之後截斷千差路頭不與萬法為侶向長連床上七尺單前高挂鉢囊壁立千仞寬立限期急下手腳盡此一生做教徹去若辦此心決不相賺我今為汝保任此事終不虗也上堂八峰今日披毛戴角銜鐵撻鞍負五須彌遊四大海無處藏竄性命總在諸人手裏幸是可憐生若是箇平分風月把守封疆底自不走作直須者裏一拶粉碎上堂魚躍於淵不能躍於階級之上太末蟲到處能緣不能緣於火𦦨之上衲僧家超佛越祖腰包天地鼻孔一缺不能補滿良久曰又爭怪得上堂龍興海底浪湧山頭不疾一刻不遲一刻石火電光捫不及卒風暴雨避不及有般漢向者裏橫拖倒拽未免犯手傷鋒殊不知一聲霹靂青霄外雨霽雲收片月孤上堂南方火爐頭有箇無賓主話至今三十年無人舉著趙州恁麼道已作屎臭氣諸人還撩起便行劍刃上走麼遍地橫尸直下免得麼八峰今日為汝等揭示去也汝等也須自救一半永樂丁亥復奉旨天界一日示疾書偈曰兀兀突突運運騰騰都來打碎遍剎遍塵擲筆瞑目而逝塔全身塔於八峰山徑山下第六世天界俊禪師法嗣普州道林月幻無際明悟禪師別號蠶骨蜀之安嶽通賢鎮莫氏子年二十出家請益老宿坐禪之要後往樓山訪清菩薩清誨以趙州無字話師乃縛竹為菴研勵無懈四指大書帖亦不顧只是拍盲做鈍工夫西江悟首座指參天界客無念過松隱咸皆稱賞其志及見白雲雲舉萬法歸一問師師答雲乃喝出一晚經行廊下雲入堂遂擒住曰大衆快將火來老僧擒下一箇賊師曰是家內人雲以手掩師口曰如何是家內事速道速道如是有省宜林能頌曰大冶紅爐烹佛祖規模鎔盡片時間歸來古路橫秋色拄杖消飛日月斑石門雲頌曰風來赤水珠含碧月到藍田玉吐光䇿馬巫山十二峽一聲猿斷九回腸白雲一日謂師曰八峯汝師也毋宜滯此師返八峰峰曰還我照用來師曰若有照用即成障礙峰曰者廝著空佛也救不得師曰有無俱寂滅空佛悉皆非峰謂侍者曰者僧有福德相拈拄杖靠椅坐命師供説行腳師為直敘峰曰你且去我不知你者㨾工夫師一日復上方丈峰震聲一喝拈拄杖作打勢師呈身就棒峰曰我棒頭有眼不打你者般死漢拽拄杖便出師拱立不動峰復還坐驀劄問曰大地平沉你在甚麼處師曰全露法王身峰曰萬法歸一一歸何處速道速道師曰不道峰曰因甚不道師曰亘古亘今峰曰亘古亘今且置你在西川什麼物恁麼來師良久峰曰啞子得夢向誰説一日峰為師更號無際師曰恁麼則無際亦未在天下老和尚盡向者裏成道歷代祖師盡向者裏成佛即今有説佛説祖底出來盡教遣出門去不如某甲者裏齁齁打睡峰笑曰者漢此後不受人瞞去也乃付偈曰一道不心光三際十方明何如明白中有明有不明師辭峰曰路逢達道者不將語默對將甚麼對師曰劈面攔腮掌擬議喪却渠峰曰子深得大機之用師出世道林古庭參師曰子將從前做工夫處親似一遍庭實供説至見諦處叉手默然師曰子見諦處如何與我不同庭以兩手大展曰者箇非別師曰者箇還著言句也無庭曰實無一字師曰只此無一字處吾為汝證明已竟楚山參師曰數年來住在何處山曰我所住廓然無定在師曰汝有何所得山曰本自無失何得之有師曰莫不是學得來者山曰一法不有學自何來師曰汝落空也山曰我向非我誰落誰空師曰畢竟若何山曰水淺石出雨霽雲收師曰莫亂道只如佛祖來也不計縱你橫吞藏教現百千神通到者裏更自不許山曰和尚雖見把斷要津其奈勞神不易師拍膝一下曰會麼山便喝師笑曰克家須是破家兒恁麼幹蠱也省力山掩耳而出師至晚復召山詰曰汝將平昔次第發明處説來山從實具對師曰還我無字意來山曰者僧問處偏多事趙老何曾涉所思信口一言都吐露翻成特地使人疑師曰如何是汝不疑處山曰青山緑水燕詩鶯啼歷歷分明更疑何事師曰未在更道山曰頭頂虗空腳踏實地師曰亦未在更道山乃禮拜師曰如是如是興龍在曰道林門墻千尺得其堂奧者或鮮矣宗廟之美百官之富深固幽遠無人能到偶披胸襟從卍字中湧出百寶光明雲與楚山相見楚山道頭頂虗空腳踏實地將謂有多少奇特僧問透水透沙時如何師曰硬不破軟玉峰乾頌曰透透何曾透那邊秋光萬傾碧連天一聲漁笛千門曉釣罷歸來月滿船正統九年應詔説法上大悅賜紫加妙心普濟禪師之號上堂堯風清宇宙舜日耀乾坤紫閣傳丹詔靈山一會新復舉憲宗迎佛舍利入大內現五色光百僚皆賀惟韓愈端立帝問百僚皆賀卿為甚不賀愈曰臣曾看佛經來佛光非青黃赤白相此是龍神阿助之光帝曰如何是佛光愈無對師代曰陛下聖明難逃智照石門雲聖節上堂舉公案畢曰隆恩法門龍象憲宗一朝天子雖然賓主互叶道合君臣舉見千載一時未免撿點石門遇此太平盛世皇上聖節有問如何是佛光敢道日月光天德山河壯帝居上堂踞虎頭把虎尾未是衲僧極則拈拄杖喝一喝下座上堂隆恩一冬百種俱全祇少箇推算的所以屬牛人撞著露柱上堂德山托鉢飢虗逼人普化搖鈴大似眼熱雲門餅趙州茶從頭勘過何異推門落臼將錯就錯若是七彎八彎三曲四曲一任銀山鐵壁空出衲僧爪牙不然饒伊向佛肚裏過來也只是箇能行的矢橛上堂荒草渡頭開正眼如披雲霧見青天平地上撞彩去獅子兒頓增勇猛把手拽向百尺竿頭一錐一劄屎急尿急一總放過三十年後破草鞋蓋得龜殼住隆恩替你道箇轉身句子杭州虎跑性天如皎禪師四明周氏子從正菴中芟染謁古拙和尚領鉗錘一夕推簾見月有省乃曰元來恁麼翌旦趨見拙便震聲一喝拙曰如貧得寶耶師曰寶即不得得即非寶拙曰憑何如是師近前問訊叉手而立拙曰還我向上一句來師便掩耳而出復呈偈曰午夜推簾月一彎輕輕踏破上頭關不須向外從他覓只麼怡怡展笑顏拙為助喜後住武林虎跑臨終示衆文章佛法空中色名相身心柳上煙唯有死生真大事殷勤了辦莫遷延大衆且道如何了辦良久吾今無暇為君説聽取松風澗底聲語畢而逝龕停七日顏色如生何密菴居士法嗣楊州田素菴大士示衆近來篤志參禪者少才提箇話頭便被昏散二魔纏縛殊不知昏散與疑情正相對治信心重則疑情必重疑情重則昏散俱無徑石滴乳集第二卷永遠流通伏願共明般若道果恆新
