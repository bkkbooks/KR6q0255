折節焉明問不是心不是佛不是物是個甚麼師曰露明曰昨日有人與麼道三十棒趂出了也師曰要打便打說甚昨日隨聲便掌明約住曰者瞎驢亂作那師擬進語明便打師復擬進語明又打師豁然契證天鐸源頌曰行到山窮水盡處鵬搏獅迅太弛張却將三尺龍泉劍揑作還魂導魄香印宗奇頌曰歷遍千峯與萬峯白雲深處見羺踪翻身直上最高頂激電驅雷縱遠鴻石門雲頌曰碎出金鸞五色髓冲開碧落萬重杉祇因客不龍門宿霹靂飛騰送遠帆次早入室明曰昨日公案未圓師打露柱一掌曰又要重說偈言明曰怎奈公案何聲未絶師震威一喝明亦喝師又喝明曰三喝四喝後又作麼生師連喝兩喝明曰識此一喝恩大難酬師禮三拜明深肯遂出源流付之印宗奇頌曰驀地恰逢沽酒店你杯我盞破窮愁相携深入桃花塢那管人間春復秋金明旭頌曰海天空濶泛輕舟逞盡風流不肯休驚起蒼梧枝上鷟直冲雲際過滄洲石門雲頌曰壞垣破屋無今古四壁通同渾不遮倐爾西風撼桂子簷前驚起數聲鴉康熙甲辰春歸住東林乙巳秋遷楚蘄華桂己酉移西陵之碧雲四衆川赴商確佛祖公案無不悅服上堂及盡去也地幹天旋龍吟霧起虎嘯風生正當恁麼時尋常做手腳底以沙門一隻眼印定森羅萬象便能口吸西江身藏北斗將三寸龜毛攪斷黃河一葉栗蓬劈開華藏頭頭現法法彰牛溲馬浡耀古輝今塵塵說剎剎談白牯狸奴吼雷掣電故先德曰入理深談以無功而會旨又曰明明古路不屬玄微一念普觀廓然空寂興化汾陽及我鴛湖諸祖得此一著提王庫刀用殺活機克振濟北家聲揭示人天正眼山僧今日亦以此著不惜贓私和盤托出敢將雲門餅趙州茶雪峯毬拋向當陽搆得底大好受用倘有出格高流更烹露地牛割蒼梧鳳剖明月珠以千聖不傳向上一著破破的相待何故鐵牛踏破玄關竅野老謳歌樂太平辛亥九月十五日以微疾示衆有記取明年今日日之語一衆駭異時有僧出問和尚尊意如何師曰三百八十四壬子又七月初旬謂徒衆曰吾欲歸里宜速備之衆以為常往遂買驢一頭以代步師顧而笑曰吾行非驢所堪自此諄諄誡衆修潔九月初八日入城辭衆檀越并諸山耆宿至十一歸山十二升座開導其略曰吾身後不許舉哀開孝效世俗所為及化錢等事不許造塔須將靈骨拋乘江河利生不得故違十五日辰刻沐浴焚香端坐書偈而逝闍維起骨得其精白齒亦不壞數珠分心如故黃安道俗頂禮泣下如喪考妣師生天啓辛酉十一月十九日世壽五十二僧臘二十八太倉藕菴竹菴真衍禪師偶閲圓覺經菩薩發問今者四大各離妄身當在何處遂撫几長嘆人生不明個事徒為僧相於本分中無所益也於是遍參一日聞板聲忽然有省造金明參介和尚執待逾年隱于婁東因疾退隱東關康熙丁巳七月十七日寅時索筆書偈曰生平孤孑杜門守拙吾道雖凉仗後昆烈喝一喝擲筆而逝塔于金墅鎮蓮花寺右圓印尼參師曰世尊拈花迦葉微笑且道笑個甚麼印一喝師曰者一喝落在甚麼處印曰不妨疑著師竪拂子曰者個聻印曰不得妄通消息師曰適來山僧道甚麼印曰前言何在師曰山僧年邁印曰年邁即得便禮拜嘉興府三塔景德寺妙雲真雄禪師姓徐金華武義人父仲芳官登州都司誕師署中及襁褓每見佛僧輒生欽悅九歲喪母時世運多艱芳歎曰大丈夫不能定亂莫若入空門趣佛乘乃棄官從華嚴自化剃染師亦依芳祝髮禮靈隱具德受戒領竹篦話參究靡懈偶至北高峯篤疑忘返擡眸見月心境廓然自爾疑團頓釋且抵寮衆咎違規師怡然笑曰若不登高望怎知滄海寬德歷舉公案詰之無不了了遂謁木陳祖印費隱箬菴浮石玉林牧雲一初諸老機鋒不讓無可師意嘗聞介和尚門風高峻道重諸方即造金明明問雲封獅窟向背無門汝從何入師曰從門入者不是家珍明曰汝是行腳僧為什向驢胎馬腹裏作活計師曰今日親見和尚明曰你看老僧眉毛落了幾莖師曰生也明便打師曰不入洪波裏怎見弄潮人明曰你見何道理恁麼道師拂袖便出尋命茶明拈果曰者是醍醐是毒藥師曰舌頭在和尚口裏明曰你作麼生會師便喝明置果師前曰試吞吐看師作禮曰謝和尚茶明即令參堂遂安維那次遷監院壬子元旦明上堂拈拂子召衆曰世尊說法四十九老僧開堂二十五靈山拈出一枝花金明豎起一柄拂且道是同是別師出衆禮拜曰且喜老漢今日瞥地明豎拂曰只者個豎窮三際橫遍十方且道承誰恩力師曰粉骨碎身未足酬明打一拂子師禮拜了依位立明即著從上源流并法偈付之康熙癸亥出世臨清州大悲寺上堂師喝一喝曰若論第一義諦諸佛列祖口挂壁上雖則官不容針新長老也只得傍開一線拈拄杖卓一卓曰莫有不顧性命底出來與拄杖子相見僧問毗盧頂上草生青金剛腳下死蛇橫即且置玉殿苔封意旨如何師曰白雲籠碧樹誰識聖堯顏曰天時地利四衆咸和慶祝一句又作麼生師曰山河天子壽世界法王身曰蠡湖滴乳傳芳永舊店重開法化新師曰也要大家出隻手曰一句渾超諸有象千載黃河今又清師曰好個消息曰學人禮拜有分師打曰且莫詐明頭問撥草瞻風瓦礫生光如何是大悲境師曰雲眠斷碣鳥宿迦頭曰人傑地靈素緇駢集如何是境中人師曰眼生眉下耳搭腮邊曰人境已蒙師指示正令全提事若何師劈脊便打僧曰作家宗師天然猶在師曰同道方知乃曰剎竿豎起古店重鋪打開寶藏運出家珍撒向諸人面前一任取足與麼會得猶較些子不與麼會拄杖子別滋一路驀卓一下曰碎波旬窟宅展佛祖家聲須憑者個握金剛王劍懸肘後靈符要是其人山僧今日承諸檀大命義不容辭斬莽披榛鑿開生佛面目墾土掘石露出本地風光頓教寒灰發焰枯木生春石獅哮吼驚起青山頭卓朔木馬嘶風踏斷黃河水倒流莫有向者裏著得一隻眼底麼良久卓杖云手握金鞭問歸客夜深誰共御垓行復舉介菴和尚住金明上堂破禪堂灰頭土面破佛殿驢額馬腮破山門擎拳持杵破佛閣待月眠雲破鐘樓知音者少令一隊破衲僧居此以破破不破破破不破不破不破底運用無窮直教七通八達若是超宗異目山僧只得另眼相看將破破底相待衆中有斫不開劈不破底麼出來金明與你破破去也師曰運壺中日月用格外鉗錘號令人天權衡佛祖不無者老漢扶豎臨濟綱宗要且未在山僧當時若在將坐具展開畫此相捲作一團拋向背後展兩子云諾看他如何合煞諸人恁麼會得然燈佛與你同參卓拄杖云換骨洗腸重整頓通身是眼更須參辛未夏嘉禾衆紳士請住三塔龍淵上堂揮拂子曰垂鈎四海祇釣鯨鯢據座披衣為求知識驀豎拂曰過去已過去未來尚未來今日正當山僧說法直須以大圓覺為伽藍安住平等一如法說令現前緇素亦如法得解然後同聲相應同氣相和悉使魔外絶跡生佛普該入一微塵現無邊身相坐毫端內轉大法輪山河大地明暗色空情與無情總在個裏頭出頭沒喝一喝曰天上有星皆拱北人間無水不潮東僧問如何是不動尊師曰卯生日戌生月其右法頌曰銀缸倒漢大浸稽天晴開海日夢覺心懸可惜孤雁一聲聲休驚他獨宿眠處林光頌曰榑桑將曉陽烏動晚翠千峯玉兔生淨洗銀河渾一事滿天碧落散璚晶晦嶽旭頌曰金烏急玉兔速東復西如轉軸赫奕難擬清光可掬飛上若木兮喚醒人間春夢踏碎珊瑚兮影搖千江水緑晷運推移念四門宮宮春到三十六天乳哺頌曰一對菱花互彰佳人晝夜巧梳粧人間天上無相似傾國傾城世莫雙天癡善頌曰鴛鴦繡出頗稱奇一個東飛一個西縱使同眠只獨宿金針從不把君知天鞏黌頌曰不待火而熱不待水而涼朝夕不停機洞然括八荒智者應無昧迷流徒自喪借陰惟大禹片片皆文章僧問如何是三類化身師曰闍黎會殺人麼曰我王庫內無如是刀師打曰不是我同流僧問如何是不退地師曰官憑文書私憑契約僧問如何是祖師西來意師曰戶外風敲竹曰明甚麼邊事師曰庭前蝶舞花曰學人不會師曰滿園桃李綻風送落莓苔僧無對師便打師在金明時一初和尚至明命師領衆出迎初問范蠡湖海月光天你為什被斷貫索絆倒師曰被和尚帶纍初舉杖曰識得者個麼師奪得擲于地初曰者無禮漢教我師兄打你去師曰不得倚勢欺人便與一掌初擬取棒師便行初見明曰者漢惱亂人不少明曰師弟莫著賊耶初曰煩師兄替我出場氣明顧師師作禮云老老和尚請坐就奉茶來抽身便出初顧明相與大笑曰俊哉衲子僧問色身敗壞即不問如何是堅固法身師曰八臂那吒撲帝鐘曰請師明示師曰石人推倒五須彌建寧府浦城友可山鐵容玄禪師別字寄翁上堂三十餘年獨穴居階寒不禁草縈裾禪心已作三冬雪一任他生作馬驢為甚如此坐久腰痛上堂衆才集師便下座知事把住問和尚因什不示一言便下座師曰早晨喫了兩碗冷粥肚裏有些不停當少待圊去來為汝等說衆罔措師便歸方丈上堂半圖畫梅花月莫作等閒看一枕波濤松樹風不可糊亂聽大衆要知此事大煞漏逗上堂山僧昨日赴個村齊咬著一粒黑光沙直到今朝牙痛不止不能與諸兄弟說黃道白便下座僧辭師問甚處去曰有住處即來向和尚道師曰你是持戒人為什不守清規曰和尚莫以罪罪人好師曰我不以罪罪你古人道喫粥了洗鉢去意作麼生曰昨夜夢裏有人問此話恰值某愛睡不曾答他師休去僧問如何是妙體師曰坑坎堆阜瓦礫荊棘如何是妙用師曰敲空作響擊木無聲鎮江府甘露寺逾祖覺禪師姓張楊州人從南京清涼劍門剃落歷參諸老無不嘉歎晚謁金明明問諸方參得底拈向一邊道得也打道不得也打師便喝明曰除却者喝更道看師曰特來親近和尚明拈拂打曰是賞是罰師禮拜明又打師豁然悟入乃曰將此身心奉塵剎明度拂子師接得打傍僧云是則名為報佛恩明曰子當珍重和碩額附石將軍元旦請上堂僧問凍雲乍展千山露化日高升宇宙清如何是新年頭佛法師曰春風才一陳何處不花開曰今日安南將軍請師升座祝延一句又作麼生師曰百年三萬六千日惟有今年最吉祥云法界恩光普乾坤色轉新如何是甘露境師曰金輪調御三千界如何是甘露人師曰玉曆鴻宣萬國春云恁麼則法化弘敷四衆均沾去也師曰裂破闍黎舌頭乃卓拄杖曰水銀落地個個皆圓古鏡臨臺塵塵煥彩春風才度萬物咸新一人有慶兆民賴之立地成佛將軍殺人不眨眼殺人不眨眼將軍立地成佛如珠走盤盤走珠驀豎拄杖曰天生玉葉金枝秀奕奕芬芳不計年康熙己巳住京都開化寺壬申孟夏示疾跏趺說偈而逝塔于甘露寺右龍世壽六十一僧臘語録若干卷行世北京牧園企賢廣清禪師山陰金氏子世業儒幼而敏慧偶遊梵剎志樂出塵從雲門剃度依三宜盂習教參林野於天童林問世尊良久外道因何悟去師曰知音不在頻頻舉林打曰還知者一棒落處麼師曰苦瓠連根苦甜瓜徹蒂甜林曰牛過櫺為什尾巴過不得師曰和尚今日却被某甲捉敗林曰者掠虗漢師拂袖便出最後謁金明明問大事未明如喪考妣且置因什大事已明亦如喪考妣師曰愁人莫向愁人說明曰你向什麼處用心師曰泥裏何必洗土塊明伸一足曰我腳何似驢腳師禮拜曰不因夜來雁怎見海門秋明打一拂子印以偈曰教網重重透禪源脉脈通更明心法法努力振綱宗上堂僧問法揚帝闕道闡蠡湖向上提持作麼生道師曰一棒一條痕曰華頂風規隨處建立祖師心印如何指示師曰火爐飛出鐵烏龜曰大機大用正令當行過量人來將何接待師便打僧一喝師連棒打退乃曰五十餘年牧一牛登山涉水未曾休於今高挂鞭繩也掉尾擎頭性已柔只是隨分納些些山悠悠更水悠悠說甚拈花微笑斷臂安心那效慈明貼榜僧堂洞山掇退果桌者隊老古錐無風興浪播揚家醜自不丈夫牧園者裏把定封疆更不畫蛇添足爾等眉生眼上耳搭腮邊又來者裏覓甚麼碗卓拄杖云各請歸堂喫茶康熙庚申孟春師示疾至四月十二日門人圓淨領衆詣方丈求垂示師曰山僧素來不涉迷悟痢疾三月纍得通身骨露若人如是會得管取超佛越祖復謂衆云古人道法身病色身即是法身色身病法身即是色身今蒙大衆問我病源山僧遍觀法界覓病根起處了不可得故曰病入膏肓神醫拱手復說偈大喝一聲便吉祥而寂世壽六十二僧臘四十一興化竺山吼菴證禪師示衆舉僧問首山如何是學人親切處山曰五九盡日又逢春曰畢竟事如何山曰冬到寒食一百五師頌曰春暖平川鶯語清笙歌從此悅行人反嗟䇿馬擁寒者孤負東君用意深平湖青蓮寺夢菴覺禪師別字一味嘉興范氏子禮金明披緇命掌記室有年深入丈室後住青蓮參扣無虗日示衆舉世尊於自恣日因文殊三處過夏迦葉欲白椎擯出才拈椎乃見百千萬億文殊盡其神力椎不能舉世尊遂問汝擬擯那個文殊迦葉無對師曰文殊三處度夏擾亂清規迦葉白椎欲擯驚羣動衆世尊問處因循使人廝鬬若是正令而行三人喫棒有分何故青蓮門下西陵報恩松岫源禪師上堂舉龐居士語未竟王公華出問既是已成的佛用選作麼師曰拖犁拽耙太平素巖智禪師麻城人上堂彩雲影裏神仙現手把紅羅扇遮面急須著眼看仙人莫看仙人手中扇舉扇云者個是扇子且道仙人在甚麼處擲扇躬身云者個是仙人扇子在甚麼處汝等諸人向者裏著得一隻眼不妨水邊林下任性逍遙倘或未然咬定牙關拚命做去自然水到渠成舉洞山麻三斤話頌曰如何是佛三斤麻搓根繩子縛烟霞等閒識得鈎頭意笑殺東村王大媽著有金剛決疑行世玄暉性禪師建寧普明雲菴真量禪師甌寧謝氏子上堂麻三斤乾矢橛且置一邊德山棒臨濟喝放過一著諸人還知獅子爪牙獰龍頭角麼脫身一色坐遺影不落同風顯大功小參饑來喫飯困來打眠衲僧門下不費鑽研祇如古德道五臺山上雲蒸飯佛殿階前狗尿天是明什麼邊事向道莫行山下路果聞猿呌斷腸聲秀州蓮花可度尼淮安田氏季子也父官以指揮坐而歿尼年七歲見父尸感嘆曰人生如此何益便有出塵志但不自由四十往扣三宜禪師于梵受復謁介菴和尚于金明遂求落髮明再三弗許尼即憂憤嘔血盈盆明憫其誠乃為剃染命看萬法歸一話𥨊食都忘不朞年而氣幾絶一日見明明問一歸何處尼訴所以明曰本自現成用許多氣力作麼尼覺心意平貼尼呈偈曰脫體風流意莫窮堂堂獨露主人公朝來換水焚香課盡在尋常日用中明可之𭬥李明心佛音尼姓葉濮鎮人幼喪母延僧誦經見地獄畫相即心動不茹葷矢志出家父為締姻尼死誓不從遂投庵落髮苦行數載禮金明圓具明命看父母未生前話刻究久之一日登樓踏板作聲有省乃呈明明愈加煅煉至育從今識得娠生面自是出羣一丈夫之句尼一日在羅廣文家補毳羅問如何是日用得力句尼以針作劄勢適歲暮羅問汝將甚麼度歲尼竪拳羅曰還別有麼尼曰來朝向居士道甲寅菊月既望沐浴端坐說偈而化廣文羅開驎居士號空諸𭬥李人幼歲讀書便能琢磨孔顏落處故受用不與人同一日隨父衡陽公過敬畏菴值石車禪師上堂不信有宗門事乃忽之順治丙戌間父母繼歿險阻備常內兄施約菴每於失意中啓發謁東塔林野禪師次參無熱首座及費隱禪師費展兩手云會麼士茫然費云當面錯過士於此信入戊子參金明介和尚深造井臼一晚落堂舉香板命衆下語士近前奪香板曰和尚把柄已在弟子手裡介顧衆曰這一期祇得個俗漢士擲香板介肯之士著有華嚴疏鈔金剛摸像家門拈頌共若干卷行世別駕項謙居士號茨菴襄毅公七世孫大金吾俊卿子也未致仕時參博山來余集生皆有機語及解綬與古南門天界盛等為方外交最後謁介和尚於金明因緣甚契乃呈偈曰聊聞舉著便承當好肉無端已剜瘡著眼機先看端的頂門誰不帶扶桑介印可士嘗舉郁山主過橋喫撲公案曰衆兄弟一眼觀天兩腳踏地且道明珠在甚麼處良久云春在草頭上王孫幾箇知有究心録行世陸煐居士號調實秀水人幼失怙恃無干於世喜遊叢席與知識盤桓不忍捨順治丁酉造金明明命看萬法歸一經三載偶閲三頓棒話如貧得寶述偈呈明明曰此是意識所作猶在半途未是到家消息士服膺庚子再參明指座上古瓶士作頌甚恰明意一日有僧乞錢士如數封定曰道得即與僧曰我年老矣士曰四大有老這箇豈有老耶僧似手點𮌎士曰試拈出看僧進前士便掌文學陸燾居士字玄度性恬淡嘗閲竺典猶如夙𦘗乃謁明菴天童平陽二隱諸宿有機語刻載行録壬辰參金明明問曾見知識否士曰六七位明曰那一位得意士曰若得意即不來也明笑曰莫瞞老僧士請開示明曰此事不從外得要明心地須看話頭士唯唯而退一日因行折足頓了厥旨偈曰十字街頭親磕著一回白汗頂門通石人扶起呵呵笑伸腳原來縮腳中呈明明深肯文學朱憲居士字欽臣因鼎革有出世志而未果辛卯間患血症乃謁金明請益參究法要明曰居士看一念未生以前這病根從甚處得來如此頻頻看去亦莫嫌閙取寂亦莫厭凡求聖昔蘇黃得力處不越此也士如教命病果愈一夜擡頭見月光皎潔乃悟入連述數偈其略曰五色雲開萬象清一輪心月徹天明虗空落地無消息世界何勞用一塵呈明明曰汝骨氣猛利志性果敢可名真毅焉明經李潛字蛟門好浮屠學嘗翻內典年二十二遇膚淺禪師示不思善不思惡那個是本來面目之話參之往謁攖寧斯瑞二公機語甚契丙午與空諸羅子盤桓遂造金明參介和尚適鐘鳴介問鐘鳴耶耳鳴耶士曰一串穿却介喝曰還穿得者箇麼士禮拜曰恩大難酬茶次介曰百丈野狐話你作麼生會士乃覆却茶杯介曰只如不落不昧又作麼生士以茶杯仰上而立介曰除却者些伎倆試道一句看士便喝介曰亂喝作麼士曰和尚莫作怪介便打士禮拜一日侍次介問臺山婆子趙明如何勘破士曰趙老舌頭無骨介頷之即示偈曰趙州銜疾走婆子減竈添兵太平日定輸贏勳勞到處標青史撒手長安莫問程遂命名真弘文學許振聲居士字無聲自幼敬信三寶最喜楞嚴莊老等書聞介和尚道風即歸信領話頭精勤體究纍年一日入室請蓋介舉扇一拍士豁然有投機偈介可之囑令操履然務實而不務虗辛酉孟冬感微恙臨終說偈曰我名振聲聲從何來法名真馨馨今何往人道我佛法中人直是冤枉曾讀孔孟幾行書且喜也不入者黨阿呵呵亭午天空月朗朗遂悠然脫去滴乳曰真字一輩按金明進祖親筆聯芳所録近有數席妄稱進祖法嗣雲詳考語録諸書該無實據未便收入集內永正元禪師法嗣秀水報本冲默真開禪師湖廣人參永正問甚處來師曰新城正曰未發足以前好與一頓師以坐具一拂正便打師少頃呈頌正接了更索師曰和尚將謂別有那正深肯示衆舉石霜參汾陽知臨濟道出常情因緣師頌曰倒腹傾腸舉似人其如不薦屈難伸一朝捉敗非輕處眼蓋乾坤氣宇新東溪退菴斷愚真智禪師嘉興人參永正問靈雲道自從一見桃花後直至如今更不疑因什玄沙却道未徹在正曰直不藏曲師曰未審徹底人如何受用正曰饑則喫飯倦即打眠師禮拜執侍二十載示衆舉香嚴上樹因緣師頌曰一等全提向上機無錐地漢做來奇當場不畏傍觀眼別有威聲動四維康熙乙卯住永正丁巳季秋二十日命撾鼓集衆師豎拳曰生死事大無常迅速各各努力莫作等閒復曰生平懶開口別衆無他語端坐斂雙眸逢人莫錯舉且道畢竟如何喝一喝遂寂塔于方丈耿惟真藏禪師參永正正問諸佛未出世人人鼻孔撩天出世後因甚杳無消息師曰坐斷天下舌頭正曰未在師即呈頌曰塗毒聲前未解聞藏鋒袖裏得堪爭當陽突出無巴鼻打失摩醯正眼睛正目之至晚落堂拈師頌問者是有巴鼻底作麼是無巴鼻底意旨師便喝正曰還別有麼師曰有即有不堪舉似正曰因甚不堪舉似師曰恐嚇殺天下人正拈拂子便打師禮拜正又打法雨行洪禪師參永正正問何處來師曰崇得正曰曾親近阿誰師曰天童報恩福嚴正曰更見何人師曰兩眼對正豎拳曰向者裏道句看師曰道破即不堪正曰未在師曰和尚要重說偈曰那正便打師曰恩大難酬正又打師禮拜後再參正問風雨淋漓遠涉不易腳跟下曾打溼也未師震聲一喝正曰猶帶泥水在師曰只為和尚老婆心切正便打師禮拜正可之寓庸禪師參永正依止數載一日正問子一向在此如何行履師曰著衣喫飯正曰此外更有事麼師曰有則辜負和尚正曰若道無亦辜負老僧師珍重禮三拜正便打永正通濟上座再參正舉拂子云諸佛未出世祖師不西來還有者個消息麼師便喝正曰祇如諸佛出世祖師西來又且如何師曰衆生度盡正曰座主見解師曰和尚又如何正便喝師豁然曰謝師慈悲便禮拜正便打杲如證菴主再參永正問向在什處躲跟主曰從來不覆藏正曰如何是你不覆藏底主曰山青水緑噪鴉鳴正曰莫是舊時面目麼主曰溪山雖異雲月是同正曰未在更道主便喝正打一如意云向者裏道一句看主禮拜正然之
