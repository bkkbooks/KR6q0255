body:
  text: 清嗣祖沙門江州真在編嗣法門人齊安機雲續徑山下第十五世普明用禪師法嗣建寧府紫雲峯衡石悟鈞禪師錢塘潘氏子幼而頴悟慧性不凡總角時矢志出塵二十受具即遍歷諸方雖有所契終不自諾復謁佛日方深得洞上微旨佛日與鴛湖友善鴛晚年多疾以不得其嗣為己憂佛日效道吾與夾山故事遂指師參鴛湖於普明洞徹圓常一日鴛問化人問幻士谷響答泉聲欲識吾宗旨泥牛水上行意旨如何師曰夢眼見空花鴛曰臨濟有一句子你又作麼生師便喝鴛便打師又喝鴛又打師禮拜鴛曰元來是瞎驢師拂袖便出鴛命掌院事崇禎辛巳鴛湖退居四衆請師開法上堂僧問昔日無趣老人今朝衡石和尚如何是源遠流長古今不異師曰開池見明月揮麈動清風曰雲峯一滴水大地盡承恩師曰會取未來的乃曰雲生寶樹風敲翠竹勘破雞鳴遍地塗毒者是無趣老人的落處即今還有知落處的麼有即出來通箇消息良久擊拂子下座師住雲峯一時緇素畢集順治乙酉間隆武仰師道風詔至內掖詳問法要師以本色奏對隆大悅賜紫竝號及追諡鴛湖廣覺大師塔曰妙莊嚴丙戌四月初四日示寂世壽三十四僧衲一十五有演義答響等録十五卷行世空諸性曰臨濟一宗自斷橋無趣祖下付授益嚴逮鴛湖而三枝競秀師居其長當干戈擾攘之餘目擊流離悲心益切一時文武大臣薦拔祈禳敦迓無虗日夫以師法道使天假之年當必與金明永正閩浙唱和大為佛祖輝皓者運逢草昧曇鉢先零嗚呼惜哉嘉興府金明寺介菴悟進禪師字覺先姓張本郡人母賀氏夢日輪入懷而誕幼不從兒嬉喜遊寺院見佛像則依依不忍去及冠習舉子業常翻內典志慕禪宗禮龍池微禪師祝髮因病臥聞匠斧斫大木聲有省即呈微微頷之師參鴛湖才跨門鴛云是甚麼師擬對鴛震威一喝師豁然契悟乃掩耳而出三角文曰洪鐘在架遇物必鳴擕劍臨鋒方稱作者當時普明老人雖向毗盧頂上曲開一線苟不遇鶻眼龍睛亦未見有今日也所以云積谷堆金易求賢得客難今日不肖兒孫恁麼判斷不是妄拈祖父遺言只貴沙盆扶起敢問現前大衆還有共相證明者麼以拄杖一卓曰放出斷橋車溪水一任滔滔滿五湖石門雲頌曰打破鴻濛竅掀翻碧落圖少林梅産玉春色滿皇都龍興在頌曰敲出金鸞五色髓撲碎驪龍明月珠天上人間俱結舌一段風流出鏡湖古林如頌拂拂春風上苑香游人不禁醉壺觴等閒破東君面勒馬歸來月轉廓天柱峻頌萬疊銀濤漲禹門揚鬐鼓鬣有鯨鯤一聲霹靂驚天地直得風雷宇宙昏夢堂倪頌曰狹路相逢驀一拶根源徹底不知窮迅雷斷送黃昏雨四海漫漫鼓黑風龍門性頌曰才承恩命處東宮不與尋常體段同石火光中明下載江南江北動悲風希覺鋭頌曰醉倚花闌日未斜却將旅館認為家陽春一曲堪回首處烟村噪暮鴉鴛湖缺安師侍次鴛命茶問曰汝字覺先喚甚麼作先師曰且喜今日得自在鴛曰如何是覺後師曰請和尚尊重鴛曰汝還分得先後麼師良久鴛便喝師曰只管吃茶鴛曰如何是吃茶的事師曰柿棗腐乾都在者裏鴛曰意作麼生師曰一口吞盡鴛曰是甚麼滋味師曰甜者甜鹹者鹹鴛曰未在更道師禮拜曰謝茶鴛深肯金明旭曰大丈夫當爐不避火迸臨場豈諱截舌機旭是普明四世孫敢言未在若是金明待他道被我一口吞盡驀竪竹篦曰者箇聻普明若出得者隻手老漢吞了底也須吐出普明上堂衆集乃舉拂子曰世尊拈一枝花老僧舉一枝拂且道是同是別師出禮三拜歸位明付師法偈曰沿流一段事竟無頭與尾付與獅子兒哮吼滿天地鐵容玄頌曰琵琶起舞換新聲總是關山離別情撩亂邊愁聽不盡高高明月照長城主峰法頌曰相逢狹路難回避腦後一槌便見腮不是虎鬚頻倒捋至今那得化龍才金明旭頌曰偶擕枯桐上國遊動絃別調意悠悠當頭驀拶悲風起代代兒孫抱杞憂僧參師曰你是高峰僧那曰是師曰既是高峯為甚在我腳下僧無話師打出僧問如何是祖師西來意師曰金風吹繡水桐葉落莓苔胡機郁曰若是英俊衲僧腦門有蓋自知金飈一夜來階砌梧桐葉我意似秋雲我心如皎月崇禎癸未冬住徑山結制上堂僧問堯天舜日野老謳歌諸護臨筵欣聞法要師曰天長地久曰一句語中含日月片言自此振宗風師曰却被上座道著乃曰今日諸方結制未免攢花簇錦巧妙尖新縵天布網打鳳羅龍底句子賺誤於人徑山別資一路為汝諸人鉗口結舌冷愀愀去寒巖枯木去一念萬年去任他機似鐵牛句如電閃管取崖州萬里住餘杭廣福上堂舉廣福惟尚禪師呈偈覺印印豎拳曰正當恁麼時作麼生尚掀倒禪牀印便喝尚曰賊過後張弓便出師曰覺印如王秉劍當斷不斷惟尚轅門衝擊逞俊不禁若據令而行各與二十拄杖且道新廣福具甚麼眼住武康天池上堂舉雪菴示衆曰乍住城隍寺無東又缺西汝才擡眼看我便放頭低鬚髮白如雪身心爛似泥本來無佛法何處是全提師曰若論全提佛法身心甚處得來天池則不然城市山林總一同聞聲見色不曾聾識得大蟲原是虎玄沙恰似謝三翁住鍾溪太平端節上堂今朝又是五月五大鬼拍手小鬼舞驀然撞著桃符神雙手捶胸呌冤苦大慧恁麼道恰似官債未了被鈎人一拶神頭鬼面一齊現出太平與你些子禁方卓拄杖曰今朝正值五月五不用雄黃并艾虎理能伏豹澤藏山雲散青天日卓午復卓一下順治戊子住金明上堂娑婆世界以音聲為佛事香積世界以香飯為佛事金明者裏以破院為佛事還見麼破禪堂灰頭土面破佛殿馬額驢腮破山門擎拳持杵破佛閣待月眼雲破鐘樓知音者少令一隊破衲僧居此以破破不破破破不破不破不破底運用無窮直教七通八達若是超宗異目向者裏輕輕拶著拍拍相應呼之以牛自能拖犁拽耙喚之以馬便乃銜鐵負山僧只得另眼相看將破破底相待衆中有斫開劈不破底麼出來金明與作破破去也良久以拄杖旋風打散歸方丈上堂問按倚天長劍奮踞地獅威學人上來請師一接師便喝僧曰者是方便門頭句如何是正令全提句師又喝僧擬進語師便打乃舉白雲端曰若端的得一回汗出便向一莖草上現瓊樓玉殿若未端的得一回汗出縱有瓊樓玉殿被一莖草蓋却師曰白雲不是好心金明者裏向不與人枷鎖你諸人端的得一回汗出頭頭玉殿處處瓊樓端的一回汗不出頭頭總玉殿處處亦瓊樓還知落處麼甜瓜徹蒂甜苦瓠連根苦示衆東熱閙西熱閙忙忙業識不知老苦他烈𦦨熾炎炎獨我陶朱靜悄悄夏蟲若解識寒氷鐵牛決不被蚊咬忽被咬驚起楊岐三腳驢百億須彌都踏倒師嘗垂三問勘驗學者一曰既是天封室理應絶此絶彼為甚有迎有送獅子窟中因甚有狗范蠡越國大夫因甚居吳地癸丑九月二十三日沐浴更衣書偈辭衆而逝世壽六十有二僧臘三十有七茶毗骨白如玉牙齒不壞骨塔於隱川大慈菴齒塔於楚黃石門山之黃荊嘉興府永正寺一初悟元禪師姓曹郡之當湖人生而岐嶷端敏喜趺坐十歲乞父教佛經能解妙義十五即參究宗乘二十豁然大悟禮興善弘遠為師參普明執侍久之明一日問我心裏不安你還得太平也未師曰蒼天蒼天又一日入室明竪拳曰道一句看師便掌明大笑師禮拜於是機契返興善掩關十有餘載順治辛卯住永正上堂花笑春風格外真規頓現漁歌曲水就中消息全彰向上拈提不礙通人唱和隨宜施設何妨達者商量寒時添衲熱則披襟休云覓火和烟得饑來喫飯倦即打眠莫道擔泉帶月歸握一拳大千香水海攝盡無餘舒一掌百億須彌盧拈來有據所以道大人得大機大智得大用設或情塵未脫翳眼猶存示衆以拄杖卓一下云道得也被他穿却鼻孔道不得也被他穿却鼻孔時有僧問道不得穿却鼻孔即且止道得因甚也穿却鼻孔師擲拄杖便歸方丈示衆問僧有一句子未打鼓前分付諸人了也若也會得方可商量如或未然豈堪共語拈拄杖一時打散歸方丈舉六祖曰我有一物無頭無尾無名無字無背無面諸人還識麼時荷澤會出衆曰是諸法之本源乃神會之佛性頌曰橫將玉笛遡風吹不犯宮商調自奇最惜能邀仙子曲被人喚作鷓鴣辭僧參舉雪峰淘米話未了師劈頭打云殘羹餿飯不勞拈出僧罔措師云學語之流直打出僧參才展坐具師便打僧云謝和尚慈悲師云山僧今日失利尼問那箇是學人本來面目師曰一場出醜尼禮拜師曰衆眼難瞞康熙戊午五月十九日東通諸檀咸集畢師合掌敘別而逝壽六十四臘四十二塔于丈室徑山下第十六世金明進禪師法嗣武康柏山資壽寺素弘真理禪師漳州海澄陳氏子初參玉林諸宿不能灑脫次謁介菴於天池契旨順治庚子住柏山上堂朔風凜凜寒威彌亘六合慧日明明光華普照大千佛祖機關一時漏泄金剛正眼一齊豁開性燥漢逴著便行不丈夫的有甚語話分諸佛出世千言萬言與人解粘云縛鼻祖西來橫說竪說只要明心達本且道本作麼生達心作麼生明縛作麼生去粘作麼生解莫巍巍堂堂是明心達本耶灑灑落落是解粘去縛耶若與麼解會只成得個韓獹逐塊是衲僧行履處大衆要會衲僧行履處驀拈拄杖卓一卓下座僧參師問三世諸佛歷代為甚麼出者裡不得僧擬議師便打石門雲頌曰飛霆激電龍翻海偃嶽旋嵐總黑風兩岸蘆花吹作雪半隨流水半飄空師隨衆作務嘗為虎說戒虎不復作祟是遠近緇素尊其道德以不及見師為恨康熙癸卯月十六向朱君行家募柴歸謂衆曰吾事畢矣即歸方丈坐化世壽五十五臘二十八永嘉萬年夢堂真倪禪師上堂僧問如何是清淨法身師云破糞箕上堂目前無法獨露真常意在目前阿誰搆取不是目前法轉換他一句子不得非耳目之所到聲色難瞞大衆到這裡也須透遇始得上堂卓主杖一下云大衆會麼者裏會得不妨歸家穩坐還會麼復卓拄杖北京安化世高本則禪師順治辛丑住湧泉上堂遇良工逢妙手端的人前謾哮吼崑崙倒跨上須彌直得翻身藏北斗放出南山鱉鼻蛇八臂那吒遭一口咄者段風光誰不知有諸昆仲靈雲不知有見桃花而悟道香嚴不知有聞擊竹以明心楊岐不知有一燈明千古寶壽不知有幾片生薑辣萬年忽猫呌師云猫子上座又為道破了也胡餅裏更討甚麼汁擊如意云頻呼小玉元無事只要檀郎認得聲上堂拈拄杖云山僧拄杖子昨夜忽抽條今朝剛吐蕊一花五葉開香透乾坤髓不假劫外之春風豈應今時之律呂卓一下云數聲野鶴驚天至無限魚龍衝浪來越恪風流從此振大家拍手舞三台嘉興府金明寺東巖璨禪師姓鮑徽州人嘗著樂道歌曰君不見山中樂道常知足三條短篾腰間束歲久年深百念消破瓦鐺邊上一個也不榮也不辱半升三斗是吾祿每日支笻㵎上遊又見牧童驅野犢嘆韶華如轉燭世事奔波何了局偷得清間快活居是佛是仙都莫做又不見自古夷齊耻周粟商山四皓有高躅竹林茅舍放𮌎懷種果栽蓮遠塵俗於此樂是真福猶勝公侯積金玉隨緣任性且逍遙塊石枕眠歌一曲阿呵呵舒兩目有誰瀟灑天地間笑罵從他喚顛禿僧問如何是到家底消息師曰待汝站定腳跟即自汝道建寧府妙峯益菴素頴鑒禪師莆田陳氏子寓普明中秋示衆中秋八月半桂轂圓璀璨清光何處無石樓尤好玩君不見江西馬簸箕鈎賊破家良可歎供養修行物外超至今流落沒崖岸昨夜三更月到嘉州大象與陝府鐵牛索閙爭這舊公案却要妙峯為他判斷山僧向他道有利無利不離行市各打二十棒趂出二俱無著漸惶直去日本國祖欵欵地擊鼓唱個菩薩蠻好快活阿汝諸人青天白日向這裡討甚碗以拄杖一齊打散康熙