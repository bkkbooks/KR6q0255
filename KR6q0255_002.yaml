通上堂無孔鐵鎚當面擲黑漆崑崙攔路坐莫有挨拶得入拈弄得出底出來道看僧問如何是臺山境師曰不是天晴便是下雨曰如何是境中人師曰金剛窟裏萬菩薩曰未審尋常所說何法師曰清風吹幽松近聽聲愈好問如何是佛法的的大意師曰今年調雨水農家好春麥問如何是祖師西來意師曰待飯僊山轉身即向汝道乃曰拈砒霜作醍醐亦曾有也撒珍珠於瓦礫誰箇不然開眼上樹特地喪全身夢昇兜率也是揚家醜未動情思轉魔女盡成菩提寶器不勞腕力指娑婆便為玅喜淨邦長水濬岳積而來瑯琊覺冰消而去信脚踏翻琉璃穽等閒擊碎珊瑚枝上堂三聖震威一喝正法眼裏撒沙南泉白刃高揮古佛家風埽土何必不必探竿豈在人手湘南潭北塔㨾脫體持來不萌枝上放春回烈𦦨堆中飛片雪有斯作略可謂其人誰家井底無天到處波心有月上堂體相用三大齊彰塵塵攝入因果智五周頓證法法圓融百城烟水不出一毫十世古今非移當念紅藕花開水香觸著蟭螟蟲半邊鼻青山低處闊展開瘦蚊子一莖眉百川競注而水體不流萬竅共號而風本自寂金獅子不勞踞地水牯牛隨分納些動容滿目家山依然青天白日冬至示眾五頂瓊瑤堆千松珠玉枝盡臺山泉石烟雲飛樓擁殿總是文殊一隻智眼真光是汝諸人常在于其中經行及坐臥還知從不曾動著他一莖眉毛麼若也與麼見得便爾攝大千於毫端廣塵沙於法界其或未然切忌東卜西卜老僧為汝諸人真實告報今朝冬至一陽生珍重示眾山高水濶月朗風清松蒼石白夏暑冬寒如是歷歷分明一一成現且道衲僧分上成得箇甚麼邊事莫有道得者麼不妨出來道看若無老僧自道去也拈拄杖便下座示眾演祖道有則奇特因緣舉似諸人欲說又被說礙不說又被不說礙大小演祖大似靈龜曳尾一言既落人耳如何諱得老僧也有一則奇特因緣索性舉似大方令你倚門傍戶者一箇箇壁立千仞便下座示眾老僧者裏也不說東村李大郎太儉也不說西社王二姊太奢也不會安角呼兔也不會添足畫蛇早起一盂白粥午後一盌清茶誰管他陳年爛葛藤冷地開花展兩手曰汝等諸人來者裏討其麼乾木查師有山居吟無事山房門不開土堦春雨綠生苔此心將謂無人委幽鳥一聲何處來後示寂塔於本山東山琦禪師法嗣太平府八峯山性空聞禪師問楚山如何是佛山曰生鐵秤錘師曰如何是法山曰石頭土塊師曰如何是僧山曰黑漆拄杖師於此信入後請益茅山三問始得脫然山命師首眾𣵠州金山寶禪師參楚山山問具得正眼當明向上一機如何是向上一機師曰青山曰卓午山曰猶未夢見在師曰木人拈玉線石女度金針山曰從上佛祖不傳之玅子作麼生領會師近前禮一拜山曰轉身一句速道將來師拂袖便出山曰放子三十棒師回身曰謝和尚垂慈山曰子雖有滔天之浪且無湛水之波師叉手默然山曰如是如是中溪隱山昌雲禪師參楚山山問法諱甚麼師曰昌雲曰道號師曰隱山曰雲在山中隱如何又出師曰只因夜來鶴帶過上頭關曰忽被狂風吹散時如何師曰依舊青天白晝山笑之太原府海雲深禪師楚山聞鐘聲問曰子還聞否師曰聞山曰你道說箇什麼師乃作鐘聲山曰只如鐘聲未發已前響在什處師曰未發已前山曰鐘聲絕後響歸何處師曰鐘聲絕後山曰耳是根響是塵知響者是什麼師曰非心不響非響不心山曰心豈有響乎師曰心雖非響響處分明山曰無響之時心在何處師曰心體湛然不逐響生不隨響滅葢由兩耳處通是以應用無礙師出世辯慧接人臨終沐浴說偈而逝唐安湛淵奫禪師上堂楚山大似逆鱗徑尺不可觸犯唐安偏向毒蛇頭上抓會他絕響無音還有說直至而今拄杖談眾中有聞得的當者麼若的當且道他說箇甚麼良久卓拄杖曰蒼天蒼天古渝濟川洪禪師問楚山水母飛上色究竟天入摩醯眼裏作舞因什不見山曰多少人向者不見處打失鼻孔師曰如何是摩醯正眼山曰面門兩眼渾無事頂中一點耀乾坤襄陽府大雲興禪師與楚山外歸因有機緣師曰大眾久立請和尚回寺山曰那裏是寺師曰鐘聲響得好山笑曰頭角彷彿鼻孔一般安慶府石經山海珠祖意禪師楚山問趙州道無字意作麼生師曰只為婆心切肝膽向人傾山曰不涉有無如何體會師曰到者裏無用心處山曰早是用心了也師曰不知山曰誰道不知師曰道者亦非山曰如是師禮拜長松大心真源禪師楚山問父母未生前試道一句看師曰道不得山曰因什道不得師曰他無口山曰又道無口師曰謝師答話山曰未在師叉手默然而立山曰如是如是師出世常舉末後句勘驗學者松藩大慈寺崇善一天智中國師彭縣人住松藩時番夷叛服不常師撫化莫不投服天順間累封國師楚山過訪師呈悟繇山曰趙州因甚道特事也無師曰秋夜家家月春來處處花一雙青白眼何處撒塵汝山曰善哉石經豁堂祖裕禪師成都巨氏子從楚山學出世法因山閱般若經師詣前窮詰領旨山曰般若智用子今得矣師禮拜三池月光常慧禪師簡州李氏子謁楚山契悟山曰佛祖本無言說凡有言說即非真理離四句絕百非試道一句看師良久進前禮三拜依位而立山曰此是諸佛諸祖之所得二十三代之所授言語不可及處覿面相承點首默契子善護持珍重翠薇悟空真空禪師楚山問徹底窮源作麼生會師曰有星皆拱北無水不朝東山曰還假功用也無師曰功用即不得山曰只此不可得處又作麼生師擬開口山震聲一喝師曰恩大難酬山曰善自保任陝府玉峰如琳禪師參楚山默契山曰子到不疑地耶師曰某甲亦不向者裏住著山曰甚處住師曰有無俱不滯脫體絕思量山曰只者絕思量處正好思量師乃諾諾天成古音韶禪師掩關次楚山問關中主在麼師曰他不曾出入師遂呈偈曰只此寂默非寂默非寂默中亦非絕渠儂面目已呈師動靜何曾有區別山可之南京香巖古溪覺澄禪師高陽張氏子受業於默菴每於禪寂中覺白水從鼻流出徧滿堂宇自意身心輕安後參楚山針芥相契天順五年住高座寺結制小參三根椽下坐堆堆把定身心若死灰撥出爐中些子火驚天動地一聲雷眾中有不惜眉毛底出來道看良久曰眉間拶出金剛𦦨露柱燈籠盡放光成化癸巳八月初九日盥沐端坐而化眾凄然師隨開目曰不須如是復瞑目珪菴祖玠侍者侍楚山了明大事一日病作有痛苦聲山曰主人公在甚麼師曰秋風不扇桂蘂飄香山曰恁麼則徧界絕遮藏也師曰有眼覰不見山曰從今別後再得相見否師曰曠劫不違今何有見山曰然則子不曾病耶師曰病與不病總不相干山執其手曰是甚麼師曰是祖玠之手山曰袓玠是誰師曰玠故非我亦不離我山歎曰善哉只箇不即不離可謂玅契無生徹證圓常之道今子見理既明雖則年茂死亦何憾師振身端坐而逝西禪瑞禪師法嗣性空覺禪師甞作顯宗歌曰達此宗無今古拶破虗空還自補聲色堆頭玅覺場放去收來無間阻體中玅夜半木人臨鏡照波斯南岸嚼寒冰塞北胡兒街市閙用中玄石女吹笙碧樹巔趙州葫蘆挂東壁村中王老夜燒錢玄中玄玅中玅寶絲網裏闘明珠須向暗中通一竅海潮音熾然說師子筋琴彈白雪兩岸青山笑點頭百年狐兔形摧滅湖州東明曉菴昇禪師關東人年十九祝髮參德翁淳領旨扣雪峰得法師出世僧問如何是無相道場師豎拂子曰會麼曰不會師曰奈汝不會僧住思師便打棠城寶文洪印禪師古渝棠城張氏子禮雪峰蓄養有年因峰遷化未獲印可遠扣楚山值定王薨世三周除禫請山陞座師出問雷音動地選佛場開一會靈山儼然未散未審皇恩佛恩如何補報山曰蕩蕩堯風清六合明明佛日照三千師曰玉梅破雪紅葉凋霜定王金容即今何在山豎拂子曰在山僧拂子頭上成等正覺放大光明師曰與麼徧界絕遮藏也山曰有眼覰不見師曰覰不見處不隔纖毫山曰末是妙師曰如何是玅山曰二邊俱抹過始見劫前人師曰蒙師點出金剛眼死去生來更不疑山曰俊哉衲子出語標宗不添為西禪之嗣師曰人天證明謝師印可出世僧問如何是祖師西來意師曰百不及一曰如何是相承底事師曰箇裏難容話機前一笑傳無相真禪師在東山作園頭楚山入園見師縛冬瓜架指瓜曰者箇無口因甚長如許大師曰某甲不曾怠一時山曰主人公還替你出力麼師曰全靠他山曰出與老僧相見師禮拜山曰猶是奴兒婢子在師拈篾縛架山顧侍僧曰菜園有虫師後得法雪峰太初性圓禪師頌何物最苦曰風前一曲動離愁惹得三塗苦未休回首寒潭空漾碧夕陽西去水東流潔空通禪師法嗣黔中正法雪光禪師族趙氏歷諸方至靈峰度夏聞舉嚴陽尊者問趙州公案有省舉似寂照照曰無功用處正好用功莫認些子光影有悞平生復結冬於景德一日定中聞岩瀑聲觸發默舉從上佛祖機緣一一透得遂往參潔空從頭舉似空曰不見道莫謂無心云是道無心猶隔一重關道了便入𥨊室師自是茫無意緒懷疑不決一日見寒山詩吾心似秋月之句疑滯頓釋後菴居古山臨終書偈而逝方湖德巖悟本禪師參楚山道業純一乃白山曰不涉寒暑是什麼人山曰適來為汝道什麼師擬對山喝曰擬心即乖師曰元來恁麼那山曰汝見箇甚麼道理師曰面目分明當機不露後參潔空得法齊安石門山黃荊印空海禪師參潔空空舉無字令師下語四十轉不契師曰可無方便耶空舉恕中頌師於言下大悟八峯潭禪師法嗣鳳陽府槎山護國無用文全禪師濟南商河劉氏子年十九投靈岩祝髮初見月天蒙示法要次參別傳有省入傳問虗空粉碎大地平沉汝在什麼處安身立命師曰昨夜泥牛吞皓月今朝木馬吐清風曰一歸何處聻師曰一自白牛歸雪嶺直至如今不見踪傳頷之復往金山謁無極囑師見寶月月問有草鞋錢麼師曰青山不露頂曰如何是應物現形師曰孤光明月普天輝萬象森羅全體現一日月入室坐次呌曰寒寒師便搬火爐向前月曰如何是火爐邊事師敲火爐三下月微笑而出入室次月拈拄杖曰者是拄杖子且道主在甚麼處師奪拄杖擲於地叉手而立月曰看者漢撞著拄杖子了也師拂袖便出後蒙印可出世槎山上堂法不孤起仗境方生道本無言因言而顯今來龍象交參諸山共處此非小緣感皇上之洪恩賢士大夫之佑護檀那喜捨僧眾清修安立禪期助斯聖化命山僧光揚宗眼令末運得種福田然雖如是猶未是衲衣下事在且道作麼生是衲衣下事僧問三乘即不問直指事如何師曰雙峰頂上鶴栖樹九龍山下鳥啼花曰西來祖意蒙師指東土相傳事若何師曰嶺上有風千古秀㵎邊流水萬年清問如何是白水境師曰一片荒田堆四野三間茆屋壯諸山曰如何是境中人師曰白虎頭邊天子廟黑龍潭底帝王基曰人境兩忘時如何師曰蘇武不知青羝意七郎常恨白鴉歸僧禮拜師拍案一下下座僧參師問如何是高峯宗旨曰石馬嘶風居物外金鷄高唱御樓前師曰有何奇特曰不遇知音者徒勞話歲寒師曰祖祖相傳相傳甚麼曰海底泥牛翻巨浪林中石女播清風師曰大地全彰是甚麼人受用曰東村李二哥師曰那山如何高曰只為強出頭師曰者山如何低曰說那不唧𠺕底師顧左右曰草裏有蛇曰照顧狗腿師曰阿㖿阿㖿南京崇福寺大慧覺華禪師上堂舉拂子曰威音那畔原只是者箇今日目前也只是者箇以拂子上下拂曰若喚作拂子瞎却人天眼目不喚作拂子亦瞎却人天眼目大眾且道喚作什麼者裏會得便知迦葉微笑二祖覓心了不可得處紹如來之傳燈續祖庭之正脉聯二十八世之英華接三十四代之骨髓眾皆默然師以拂子擊曰千聖不識嘉興府天寧寺默堂宣禪師初謁楚山頓契微旨後參八峰峰舉雲門放洞山三頓棒師語屬意路峰叱之師頓忘𥨊食一日偶聞隣單僧舉五百羅漢降毒龍師踴躍下單僧曰者漢顛耶師便與一掌及見峰峯曰開口即錯你露箇消息看師珍重禮三拜峰深肯一日付師偈曰竺國拈花旨嵩山斷臂宗人天展付汝無始亦無終出世天寧禪法一味不許學者看文書并作偈頌或有私作查實擯出臨終眾請遺偈師曰老僧平常無一言半句何蛇足為也端坐而逝伏牛月天禪師因昶公參師曰甚處來昶曰少室師曰達磨隻履西歸如何見底昶曰天接白雲過水和明月齊師曰何不與我傳得境來昶近前展兩手曰請師看看師謂傍侍曰此子向後豎臨濟之柱石挺山之門庭有日在昶乃禮謝天寧忠禪師法嗣杭州徑山寂菴潛禪師頌夏末秋初曰寶殿瓊樓鎖玉虗堦除清碧影蒙糊頂門瞎却摩醯眼肘後空懸奪命符僧問如何是本來人師曰驢前馬後曰學人不會師曰者田厙奴好惡也不識明州用剛宗軟禪師參孤舟受三不是話天順初參和菴菴一日上堂祖師心印狀似鐵牛之機去即印住住即印破不去不住汝等作麼生師在傍得大休歇住後示眾大凡做工夫只要起大疑情不失正念千疑萬疑祇是一疑纔有間斷即落空也見汝等做工夫未曾半月一月打成一片焉得不走作果若真疑現前撼搖不動自然不怕惑亂又不得起一念歡喜心纔有絲毫異念即打作兩橛只管勇猛忿將去終日如箇死漢相似到者般時節那怕甕中走却鼈佛跡真禪師法嗣黃梅廣福天然宗浩禪師因僧問如何是道師曰擎茶過盞曰如何是道中人師曰奴顏婢膝別峰寶芳藏禪師辭佛跡住後荷衣松食二十餘年致有傍巖縛箇尖頭屋折脚床頹就石支之句僧參師拈棒作舞曰你賊我也僧長噓一聲而去處州白雲無量滄禪師示眾二六時中隨話頭而行隨話頭而住隨話頭而坐隨話頭而臥心如栗棘蓬相似不破一切人我無明五欲三毒之所吞噉施為動靜通身是箇疑團疑來疑玄終日獃樁樁地聞聲見色管取㘞地一聲去在
