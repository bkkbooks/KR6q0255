body:
  text: 清嗣祖沙門江州真在編嗣法門人齊安機雲續徑山下第七世東林悟禪師法嗣金陵太岡月溪澂禪師禮圓照寺無著出家精究天台止觀有方僧謂師曰你向後為法門甘露毋久滯此師乃請益佛法大意僧令自看一日偶閱傳燈見地藏舉肇論曰天地與我同根萬物與我一體始知山河大地草木昆蟲都善法要自此一錫徧參最後至東普道林呈所見林不諾師以林強抑出不遜語辭林知是法器遂負囊送至山門忽指黃犬曰者畜生為甚有業識無佛性師於言下大悟太陽聞禪師曰道林垂鈎四海月溪曳裙龍門雖然通身徧身未免龍頭蛇尾還有為月溪攙鎗奪鼓者麼出來與拄杖子相見道林一日舉無字示徒師在傍深得奧旨付偈曰我無法可付汝無心可受無付無受心何人不成就石門雲曰牛喫禾馬腹脹復頌曰拈出當陽鬼見愁撩天索價許誰酬一聲布穀千林曉春滿皇都四百州毒峯善參師問如何是無字曰本善一向隨人道是箇無字今日看來是口金剛王寶劍師曰如何是金剛王寶劍曰寒霜𦦨𦦨輝古騰今師曰還我劍來曰擬動即犯他鋒鋩師曰橫按當軒時如何曰佛來也殺祖來也殺師曰老僧來聻曰亦不相饒師曰殺敗後如何曰且喜天下太平師住太岡上堂揚眉瞬目也不得不揚眉瞬目也不得揚眉瞬目不揚眉瞬目總不得太岡與你二便二一便一還得麼一僧出師便打僧喝師又打僧連喝兩喝師曰你說好喝那僧擬議師便喝景泰初應詔住廣恩寺上日臨聽法甚悅賜號為慈普禪師三年勅歸一日室中出祖衣示徒曰此衣是唐朝宮主所置今八百餘年矣祖祖相傳至東普先師先師付與老僧若是克家種子方堪紹荷狐假虎威焉敢希冀又曰如百丈侍馬祖祖侍南嶽嶽侍曹溪六祖皆久久親炙磨光剉銳乃能豁徹重關覊鎖埽盡微見窠臼深得大機大用可為人天眼目上堂高提祖印朗慧日於中天再振頺網扇淳風於末運旋機陷虎轉令屠龍但恁麼去二乘膽落十地魂消放開一線玅契心宗坐却三叉相逢狹路拽在萬仞了無向背密移一步地濶天空所以風搏玅翅雷送遊龍不即不離續四七二三祖之慧命不離不即弘石橋雙徑祖之徽猷直下洞徹玄微就中披見肝膽兒孫匝地誰不丈夫隨行踏斷流水縱觀寫出禽跡針鋒上不許衲僧蹲身諸人脚跟下為甚黑漆漆問木馬吸乾滄海水魚龍蝦蠏以何為命問無邊剎境自他不隔於毫端龍王為甚失却定海珠問鯤化鵬眼在蚯蚓化百合何在問為甚鐵牛眠少室問向上一路羅籠不住呼喚不回大力量人為甚坐在百尺竿頭師一日謂眾曰老僧明日遊天台常住宜速備辦監院曰和尚去甚麼時回師屈指示曰二五至五鼓坐脫時大風震起白光燭地塔全身於本山壞空成禪師僧問如何是六不收師曰石敢當金陵玅峰玄禪師僧問如何是異類師曰角邊腮搭觜眉底赤雙睛廬山天池無為一禪師僧問祖意教意是同是別師曰牛拖犁馬拽犁馬拽磨伏牛無礙鑒禪師僧參師喝曰看劍僧曰幸是某甲若是別人一場禍事師曰那箇是別人試指出看僧掀倒禪床師曰幸是老僧若是別人打折你驢腰金臺大容山古庭善堅禪師滇之昆明人參一歸何處話一日定中聞僧曰見無所見即真見師於此頓然脫落正統乙丑參無際得法就止大容山雲水不絕無際恐出世早命為首座問曰子別在甚處師曰佛祖行不到處際曰還計人來否師曰坦然無礙際曰從上古人阿誰有超祖之智師曰黃檗際曰子見黃檗麼師曰縱是黃檗也須見擯際曰敢在我者裏說大話師曰正眼無私際曰觀子之見吾非子之師也師曰無有過量豈免貶剝際曰如是如是師後歸昆明古庭示寂古庭與盤山并峙至今二大士肉身存焉舒州投子楚山幻叟荊璧紹琦禪師蜀之唐安雷氏子九歲從玄極通受業首參道林一日聞板聲有省復徧叩海舟月溪諸老咸稱賞之正統六年再參道林得法後出世天柱僧問如何是天柱境師曰㵎濶雲歸晚山高日出遲曰如何是境中人師曰額下眉遮眼腮邊耳搭肩曰如何是天柱家風師曰雲甑炊松粉冰鐺煑月圓曰如何是祖師西來意師曰海神撒出夜明珠曰學人不會師曰文殊失却玻璃盞景泰五年遷投子上堂僧問遠離皖山來據投子海眾臨筵請師祝聖師曰鼎內長生篆峰頭不老松曰祝聖已蒙師的旨投子家風事若何師曰提瓶穿市過不是賣油翁曰只如祖師道不許夜行投明須到還端的也無師曰雖然眼裏有筋爭柰舌頭無骨曰趙州道我早猴白你早猴黑意作麼生師曰不因弓矢盡未肯豎降旗問和尚今日陞座說法未審有何祥瑞師曰麒麟步驟丹霄外優鉢花開烈火中曰如何是祖師西來意師曰雪消山頂露風過樹頭搖問寶劍未出匣時如何師曰神號鬼哭曰出匣後時如何師曰佛祖吞聲曰出與未出時如何師曰無鬚鎖子兩頭搖僧提起坐具師便喝僧擬議師便打乃曰毒蛇頭上揩癢猛虎口裏橫身也須是恁般人始得適來者僧大似一員戰將敢來者裏口鼓攙旗惜乎龍頭蛇尾死在棒下若解轉身活路自然不犯鋒鋩所以道弄蛇須是弄蛇手不會弄蛇蛇咬殺復舉法燈示眾山僧本欲深藏岩穴隱遁過時葢為清凉老人有未了公案不免出來為渠了却時有僧問未審清凉老人有甚未了公案燈拈拄杖便打曰祖禰不了殃及兒孫曰過在甚處燈曰過在我殃及你師曰大凡宗師出世先要拈出己見然後方可定斷古今看他法燈如此作略美則美矣了則未了幻叟今日亦為蚕骨老人有未了公案出來為渠了却若有問蚕骨老人有甚不了公案應聲便喝眼目定動連棒打出大眾山僧恁麼提持且道與法燈用處還有優劣也無若緇素得出許他是箇同參上堂眾集師斂衣就座良久曰分明記取便下座示修淨土上堂誰心無佛誰佛無心心佛殊名體無二致是故念佛念心念心念佛無念無心無心無佛心佛兩忘念不可得只者不可得處脫體分明纖塵不間是以真機觸目徧界難藏山色溪聲頭頭顯露性相平等理事混融箇裏覓一毫自他淨穢之相了不可得何凡聖迷悟之有也於此果能豁開智眼頓悟其真直下知歸不勝慶快還識心佛麼直須揣見虗空骨看取優曇火裏開上堂顧視大眾曰只者些子誵訛古今多少師僧到者裏開口不得思量不及舉揚不出驀拈拄杖曰今日為甚却落在山僧手中以拄杖橫按曰橫也由我豎起拄杖曰豎也由我放下拄杖曰放下也由我以致卷舒殺活總由我又以拄杖向空中點一下曰正當恁麼時從上佛祖以至天下老和尚到者裏只得乞命有分眾中莫有為佛祖出氣底麼良久卓拄杖一下曰𭣟瞎金剛正眼靠倒空王寶殿汝等諸人討甚麼碗示眾選佛場開定祖機辨明邪正在鉗鎚禹門浪暖風雷動正是魚龍變化時眾中莫有衝波激浪者麼良久以拂子打曰機先一著覿面全提擊禪床一下句外一言和聲揭露不許停思顧佇那容擬議分踈眨得眼來劍去久矣縱饒佛祖到來也只攢眉有分何故葢為非言路可通非心識可測若是英俊衲僧向未舉已前便當點首一笑猶較些子近世人心不古學者不務真參實悟惟是接響承虗以學識依通為悟明穿鑿機緣為參究破壞律儀為解脫夤緣據位為出世以致祖風凋獘魔說熾然塞佛祖之坦途瞽人天之正眼使吾祖教外別傳之道於斯委地大覺世尊於二千年外早已識得眾生心病預設多方曲垂規則故曰末世眾生希望成道無令求悟惟益多聞增長我見又曰眾生未悟作何方便普令開悟所以結制安居剋之則隨往無礙故知解結之有時也諸大德於九十日中還曾證悟也無已悟者且置勿論如或未悟則此一期又是虗喪了也若是真正道流以十方法界為圓覺期場無論百日千日結制解制但以舉起話頭為始一年不悟參一年十年不悟參十年及至二十年三十年盡平生不悟決定不移此志只要見箇徹頭徹尾真實究竟處方一放參之日所謂一念萬年豈虗語哉豎起拂子諸大德還知落處麼幻叟今日不辭饒舌更為諸人下箇註脚猛火鑄成金彈子當機揑碎又渾圇等閒得失俱拈却風送潮音出海門天順改元由匡廬歸蜀韓都候於方山建雲峰寺迎師住持成化九年三月望日示微疾眾請末後句師展兩手曰會麼復曰今年今日推車撞壁撞破虗空青天霹靂阿呵呵泥牛吞却老龍珠澄澄性海漚花息泊然而逝壽七十僧臘六十一普州大定太虗冲禪師問無際德山用棒臨濟行喝還當得際曰臨濟德山且止親切還我話頭來師曰若論親切處和尚也須迴避際拈拄杖師便喝重慶府西禪雪峰瑞禪師天奇瑞參師問無字意作麼生奇乃移時方覺答曰㵎底頑冰吞宇宙性湖明月匝天寒師大喝曰汝還有嫌凡愛聖底心掃妄求真底見奇曰是師曰你若嫌凡愛聖斷般若之善根你若掃妄求真絕諸佛之命脉震聲又喝曰真又是誰妄又是誰凡又是誰聖又是誰奇豁然便禮拜伏牛物外無念圓信禪師金臺高氏子生於宣德己酉九歲出家受具後首見無際於隆恩有省入天順己卯歸牛山結茆辛巳詣繁昌參月幻幻問何處來師曰牛山幻曰人在者裏牛聻師曰覿面不相識全體露堂堂幻曰雖然如是頭角不全在師曰某甲今日山行困幻復拈起竹篦曰喚作竹篦則觸不喚作竹篦則背上座作麼生師曰有勞神用幻曰未在更道師便進前奪竹篦擲於地幻軒渠大笑師曰某甲罪過便禮拜幻乃撫而印之師菴居三十載開法伏牛僧問龐居士道一種沒絃琴惟師彈得玅某甲今日請和尚彈看師欬𠻳一聲僧曰不會師曰鐘作鐘聲鼓作鼓響曰意旨如何師曰馬祖去世久矣問如何是即心即佛師曰富兒易驕曰非心非佛又作麼生師曰窮坑難滿曰某甲不會師曰若道即心即佛大似好肉剜瘡若言非心非佛何異灸如艾直饒道不是心不是佛不是物也是平地乞交且道畢竟如何坐來拭几添香火粥罷呼童洗鉢盂黃州石門山黃荊潔空圓通禪師上堂拂子未拈已前針錐徧地及向諸人面門一拂便覺有生有殺有權有實雕文喪德伊誰之咎你有拄杖子我與你拄杖子你無拄杖子我奪你拄杖子石門不是痛處著艾要與古人抖筋抖骨所謂珠簾半捲剛羞面彩袖餘霞拂石苔太平府八峰山廣善寶月潭禪師大慧參師問如何是祖師西來意慧曰東嶺上有雲師曰有雨雲無雨雲慧曰雨淋淋地師曰下後如何慧曰白浪滔天師曰盡大地是箇火坑得何三昧不被燒却慧曰東海鯉魚吞却日成化間一日撾鼓上堂化緣已畢大地山河絕消息黃金殿上無知音免教諸人空狼藉便化素菴田大士法嗣楊州天寧寺和菴忠禪師僧參師曰甚處來曰嵩山師曰曾到五乳峯麼曰在彼過夏師曰聽月岩畔石為甚麼大底大小底小僧無對師打曰何曾到彼來大雲入曰要到五乳峯麼豎拂子曰盡大地人向者裏相見四明法中正堪禪師僧參師豎拂子曰你道喚作甚麼曰寧可永劫沉淪不向諸聖求解脫師擲下拂子復豎拳曰你道者箇喚作甚麼曰學人終不作鬼窟裏活計師笑曰龍蛇易辨衲子難瞞僧禮拜佛跡頤菴真禪師示眾青山疊疊綠水滔滔於斯會得獨步高超雖然如此也是尋常茶飯古德云欲窮千里目更上一層樓承古有言機不離位墮在毒海語不驚人陷於流俗若擊石火裏別緇素閃電光中辨殺活可以坐斷千差壁立萬仞還知有恁麼時節也無錯勘破了也如今談禪者脚跟點地鼻孔撩天具正眼者落落罕聞所以偏正不一各立異端堅執己解勿通實理所謂正法難扶邪法競興古云信有十分則疑有十分疑有十分則悟有十分可將眼裏所見耳裏所聞惡知惡見奇言玅句禪道佛法貢高我慢等心徹底傾瀉莫存毫末只就向未明未了公案上距定脚跟豎